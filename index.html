<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>¿Hoy juega el América?</title>
  <style>
    :root {
      --bg: #0f172a;
      --card: #111827;
      --text: #f8fafc;
      --muted: #cbd5e1;
      --accent: #facc15;
      --accent-2: #1d4ed8;
      --danger: #dc2626;
      --success: #16a34a;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(135deg, var(--bg), #1e293b);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      width: 100%;
      max-width: 720px;
      background: rgba(17, 24, 39, 0.92);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 24px;
      padding: 40px 28px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.35);
      text-align: center;
    }

    .badge {
      display: inline-block;
      padding: 8px 14px;
      border-radius: 999px;
      background: rgba(250, 204, 21, 0.16);
      color: var(--accent);
      font-weight: bold;
      margin-bottom: 18px;
      letter-spacing: 0.4px;
    }

    h1 {
      font-size: clamp(2rem, 5vw, 4rem);
      margin: 0 0 14px;
      line-height: 1.05;
    }

    p {
      color: var(--muted);
      font-size: 1.05rem;
      margin: 0 0 26px;
    }

    .status {
      margin: 28px auto 18px;
      padding: 26px 18px;
      border-radius: 20px;
      font-size: clamp(1.6rem, 4vw, 3rem);
      font-weight: 800;
      transition: all 0.25s ease;
    }

    .yes {
      background: rgba(22, 163, 74, 0.16);
      border: 1px solid rgba(22, 163, 74, 0.35);
      color: #bbf7d0;
    }

    .no {
      background: rgba(220, 38, 38, 0.16);
      border: 1px solid rgba(220, 38, 38, 0.35);
      color: #fecaca;
    }

    .loading {
      background: rgba(29, 78, 216, 0.16);
      border: 1px solid rgba(29, 78, 216, 0.35);
      color: #bfdbfe;
    }

    .details {
      margin-top: 16px;
      color: var(--text);
      font-size: 1.05rem;
      line-height: 1.6;
      min-height: 72px;
    }

    .details strong {
      color: white;
    }

    .controls {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 18px;
    }

    button {
      border: none;
      border-radius: 14px;
      padding: 14px 18px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.15s ease, opacity 0.15s ease;
    }

    button:hover { transform: translateY(-1px); }
    button:active { transform: translateY(0); }

    .primary {
      background: var(--accent);
      color: #111827;
    }

    .secondary {
      background: var(--accent-2);
      color: white;
    }

    .footer {
      margin-top: 22px;
      font-size: 0.95rem;
      color: #94a3b8;
    }

    img.match-image {
      max-width: 100%;
      border-radius: 16px;
      margin-top: 20px;
      display: none;
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="badge">Versión con API</div>
    <h1>¿Hoy juega el América?</h1>
    <p>¡Vamos por la décimo séptima!</p>

    <section id="status" class="status loading">Consultando partido...</section>

    <div id="details" class="details"></div>

    <img id="imgSi" class="match-image" src="hoy_juega_america.png" alt="Hoy juega el América">
    <img id="imgNo" class="match-image" src="no_juega_america.png" alt="Hoy no juega el América">

    <div class="controls">
      <button class="primary" onclick="loadMatchStatus()">Actualizar</button>
      <button class="secondary" onclick="showDebugInfo()">Ver diagnóstico</button>
    </div>

    <div class="footer" id="footer">
      Fuente: próximo partido del Club América y conversión a hora de CDMX.
    </div>
  </main>

  <script>
    const TEAM_ID = "134193";
    const API_URL = `https://www.thesportsdb.com/api/v1/json/123/eventsnext.php?id=${TEAM_ID}`;
    const MEXICO_TZ = "America/Mexico_City";

    let lastDebug = null;

    function formatDateInTimeZone(date, timeZone) {
      return new Intl.DateTimeFormat("en-CA", {
        timeZone,
        year: "numeric",
        month: "2-digit",
        day: "2-digit"
      }).format(date);
    }

    function formatTimeInTimeZone(date, timeZone) {
      return new Intl.DateTimeFormat("es-MX", {
        timeZone,
        hour: "2-digit",
        minute: "2-digit",
        hour12: false
      }).format(date);
    }

    function formatLongDateTimeInMexico(date) {
      return new Intl.DateTimeFormat("es-MX", {
        timeZone: MEXICO_TZ,
        weekday: "long",
        day: "numeric",
        month: "long",
        hour: "2-digit",
        minute: "2-digit",
        hour12: false
      }).format(date);
    }

    function setLoading(message = "Consultando partido...") {
      const status = document.getElementById("status");
      const details = document.getElementById("details");
      const imgSi = document.getElementById("imgSi");
      const imgNo = document.getElementById("imgNo");

      status.textContent = message;
      status.className = "status loading";
      details.innerHTML = "";
      imgSi.style.display = "none";
      imgNo.style.display = "none";
    }

    function setStatus(playsToday, detailsHtml) {
      const status = document.getElementById("status");
      const details = document.getElementById("details");
      const imgSi = document.getElementById("imgSi");
      const imgNo = document.getElementById("imgNo");

      if (playsToday) {
        status.textContent = "Hoy juega el América";
        status.className = "status yes";
        imgSi.style.display = "block";
        imgNo.style.display = "none";
      } else {
        status.textContent = "Hoy no juega el América";
        status.className = "status no";
        imgSi.style.display = "none";
        imgNo.style.display = "block";
      }

      details.innerHTML = detailsHtml || "";
    }

    function setError(message) {
      const status = document.getElementById("status");
      const details = document.getElementById("details");
      const imgSi = document.getElementById("imgSi");
      const imgNo = document.getElementById("imgNo");

      status.textContent = "No se pudo consultar";
      status.className = "status no";
      details.innerHTML = `<strong>Error:</strong> ${message}`;
      imgSi.style.display = "none";
      imgNo.style.display = "none";
    }

    function buildUtcDateFromEvent(event) {
      if (!event.dateEvent || !event.strTime) {
        return null;
      }

      // strTime viene mejor interpretado como hora UTC.
      // Ejemplo: 2026-04-08 + 00:00:00 UTC => 2026-04-07 18:00 en CDMX.
      return new Date(`${event.dateEvent}T${event.strTime}Z`);
    }

    async function loadMatchStatus() {
      setLoading();

      try {
        const response = await fetch(API_URL);
        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }

        const data = await response.json();

        if (!data.events || data.events.length === 0) {
          setStatus(false, "No se encontró un próximo partido en la respuesta del servicio.");
          return;
        }

        const event = data.events[0];
        const kickoffUtc = buildUtcDateFromEvent(event);

        if (!kickoffUtc || Number.isNaN(kickoffUtc.getTime())) {
          throw new Error("La fecha u hora del partido no se pudo interpretar.");
        }

        const todayInMexico = formatDateInTimeZone(new Date(), MEXICO_TZ);
        const matchDateInMexico = formatDateInTimeZone(kickoffUtc, MEXICO_TZ);
        const matchTimeInMexico = formatTimeInTimeZone(kickoffUtc, MEXICO_TZ);

        const playsToday = todayInMexico === matchDateInMexico;

        const home = event.strHomeTeam || "Equipo local";
        const away = event.strAwayTeam || "Equipo visitante";
        const league = event.strLeague || "Competencia no especificada";
        const longDate = formatLongDateTimeInMexico(kickoffUtc);

        const detailsHtml = playsToday
          ? `
            <strong>${home} vs ${away}</strong><br>
            ${league}<br>
            ${longDate} (hora de CDMX)
          `
          : `
            <strong>Próximo partido:</strong><br>
            ${home} vs ${away}<br>
            ${league}<br>
            ${longDate} (hora de CDMX)
          `;

        lastDebug = {
          rawEvent: event,
          todayInMexico,
          matchDateInMexico,
          matchTimeInMexico,
          kickoffUtc: kickoffUtc.toISOString(),
          playsToday
        };

        setStatus(playsToday, detailsHtml);

        document.getElementById("footer").textContent =
          `Última actualización: ${new Intl.DateTimeFormat("es-MX", {
            timeZone: MEXICO_TZ,
            dateStyle: "medium",
            timeStyle: "short"
          }).format(new Date())}`;
      } catch (error) {
        setError(error.message);
      }
    }

    function showDebugInfo() {
      if (!lastDebug) {
        alert("Aún no hay datos cargados.");
        return;
      }

      alert(
        [
          `todayInMexico: ${lastDebug.todayInMexico}`,
          `matchDateInMexico: ${lastDebug.matchDateInMexico}`,
          `matchTimeInMexico: ${lastDebug.matchTimeInMexico}`,
          `kickoffUtc: ${lastDebug.kickoffUtc}`,
          `playsToday: ${lastDebug.playsToday}`
        ].join("\n")
      );
    }

    loadMatchStatus();
  </script>
</body>
</html>
