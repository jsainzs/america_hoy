<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>¿Hoy juega el América?</title>

  <style>
    :root {
      --text: #f8fafc;
      --muted: rgba(255,255,255,0.88);
      --accent: #facc15;
      --accent-soft: rgba(250, 204, 21, 0.18);
      --green: #22c55e;
      --red: #ef4444;
      --panel: rgba(4, 15, 35, 0.46);
      --panel-border: rgba(255,255,255,0.10);
      --shadow: 0 20px 60px rgba(0,0,0,0.32);
      --bg-blue: #0a1f44;
      --bg-blue-2: #16386e;
      --bg-cream: #f3cf18;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background:
        radial-gradient(circle at 25% 20%, rgba(255,255,255,0.08), transparent 24%),
        radial-gradient(circle at 80% 30%, rgba(255,255,255,0.06), transparent 28%),
        linear-gradient(135deg, var(--bg-blue) 0%, var(--bg-blue-2) 42%, var(--bg-cream) 100%);
      color: var(--text);
      min-height: 100vh;
      padding: 28px;
      position: relative;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* TAPIZ DE FONDO */
    .bg-tapestry {
      position: absolute;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      overflow: hidden;
      opacity: 0.15;
      display: flex;
      align-items: stretch;
      justify-content: stretch;
    }

    .bg-tapestry::before {
      content:
        "CLUB AMÉRICA  MOISÉS MUÑOZ  CUAUHTÉMOC BLANCO  CARLOS REINOSO  CRISTÓBAL ORTEGA  ALFREDO TENA  GUILLERMO OCHOA  SALVADOR CABAÑAS  ENRIQUE BORJA  LUIS ROBERTO ALVES  HUGO SÁNCHEZ  HENRY MARTÍN  IVÁN ZAMORANO  ORIBE PERALTA  PÁVEL PARDO  RUBENS SAMBUEZA  GUIDO RODRÍGUEZ  CLUB AMÉRICA  MOISÉS MUÑOZ  CUAUHTÉMOC BLANCO  CARLOS REINOSO  CRISTÓBAL ORTEGA  ALFREDO TENA  GUILLERMO OCHOA  SALVADOR CABAÑAS  ENRIQUE BORJA  LUIS ROBERTO ALVES  HUGO SÁNCHEZ  HENRY MARTÍN  IVÁN ZAMORANO  ORIBE PERALTA  PÁVEL PARDO  RUBENS SAMBUEZA  GUIDO RODRÍGUEZ  CLUB AMÉRICA  MOISÉS MUÑOZ  CUAUHTÉMOC BLANCO  CARLOS REINOSO  CRISTÓBAL ORTEGA  ALFREDO TENA  GUILLERMO OCHOA  SALVADOR CABAÑAS  ENRIQUE BORJA  LUIS ROBERTO ALVES  HUGO SÁNCHEZ  HENRY MARTÍN  IVÁN ZAMORANO  ORIBE PERALTA  PÁVEL PARDO  RUBENS SAMBUEZA  GUIDO RODRÍGUEZ";
      white-space: pre-wrap;
      line-height: 2.15;
      letter-spacing: 1px;
      font-weight: 700;
      font-size: clamp(20px, 2vw, 28px);
      color: rgba(255,255,255,0.48);
      display: block;
      width: 140%;
      transform: rotate(-14deg) scale(1.15);
      transform-origin: center center;
      position: absolute;
      top: -8%;
      left: -10%;
      text-align: justify;
    }

    .bg-tapestry::after {
      content:
        "AMÉRICA  MOISÉS MUÑOZ  CUAUHTÉMOC BLANCO  CARLOS REINOSO  ALFREDO TENA  CRISTÓBAL ORTEGA  GUILLERMO OCHOA  HÉCTOR ZELADA  ADOLFO RÍOS  SALVADOR CABAÑAS  CARLOS HERMOSILLO  ORIBE PERALTA  HENRY MARTÍN  IVÁN ZAMORANO  ÓSCAR RUGGERI  CLAUDIO LÓPEZ  ANTONIO CARLOS SANTOS  PÁVEL PARDO  CLUB AMÉRICA  AMÉRICA  MOISÉS MUÑOZ  CUAUHTÉMOC BLANCO  CARLOS REINOSO  ALFREDO TENA  CRISTÓBAL ORTEGA  GUILLERMO OCHOA  HÉCTOR ZELADA  ADOLFO RÍOS  SALVADOR CABAÑAS  CARLOS HERMOSILLO  ORIBE PERALTA  HENRY MARTÍN  IVÁN ZAMORANO  ÓSCAR RUGGERI  CLAUDIO LÓPEZ  ANTONIO CARLOS SANTOS  PÁVEL PARDO";
      white-space: pre-wrap;
      line-height: 2.25;
      letter-spacing: 1px;
      font-weight: 400;
      font-size: clamp(15px, 1.4vw, 20px);
      color: rgba(255,255,255,0.32);
      display: block;
      width: 140%;
      transform: rotate(-14deg) scale(1.15);
      transform-origin: center center;
      position: absolute;
      top: 16%;
      left: -6%;
      text-align: justify;
    }

    .shell {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 1120px;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--panel-border);
      border-radius: 28px;
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      box-shadow: var(--shadow);
      overflow: hidden;
      padding: 34px;
    }

    .title {
      margin: 0 0 24px;
      text-align: center;
      font-size: clamp(2rem, 4vw, 3.2rem);
      line-height: 1.05;
      font-weight: 800;
      text-shadow: 0 4px 20px rgba(0,0,0,0.35);
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(280px, 420px) 1fr;
      gap: 30px;
      align-items: center;
    }

    .media-wrap {
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .hero {
      display: none;
      width: 100%;
      max-width: 380px;
      max-height: 560px;
      object-fit: contain;
      border-radius: 20px;
      box-shadow: 0 18px 45px rgba(0,0,0,0.35);
      border: 1px solid rgba(255,255,255,0.08);
      background: transparent;
    }

    .hero.visible {
      display: block;
    }

    .content {
      display: flex;
      flex-direction: column;
      justify-content: center;
      min-height: 100%;
    }

    .status {
      margin: 0 0 16px;
      font-size: clamp(2rem, 3vw, 3rem);
      font-weight: 800;
      line-height: 1;
    }

    .yes { color: var(--green); }
    .no { color: var(--red); }

    .details {
      font-size: clamp(1.05rem, 1.5vw, 1.35rem);
      line-height: 1.45;
      color: var(--muted);
      margin-bottom: 10px;
      text-shadow: 0 2px 14px rgba(0,0,0,0.28);
    }

    .details b {
      color: #fff;
      font-size: 1.08em;
    }

    .meta-line {
      display: inline-block;
      margin-top: 10px;
      padding: 8px 14px;
      border-radius: 999px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.08);
      font-size: 0.95rem;
      color: rgba(255,255,255,0.9);
    }

    .reference-time {
      margin-top: 12px;
      font-size: 0.94rem;
      color: rgba(255,255,255,0.76);
    }

    .titles-box {
      margin-top: 18px;
      padding: 16px 18px;
      border-radius: 18px;
      background: rgba(250, 204, 21, 0.10);
      border: 1px solid rgba(250, 204, 21, 0.24);
      color: #fff7cc;
    }

    .titles-heading {
      font-size: 0.98rem;
      font-weight: 700;
      margin-bottom: 12px;
      color: #fff;
    }

    .title-row {
      margin-bottom: 14px;
    }

    .title-row:last-child {
      margin-bottom: 0;
    }

    .title-label {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 6px;
      font-size: 0.96rem;
      color: rgba(255,255,255,0.95);
    }

    .title-label strong {
      color: #fff;
    }

    .eagle-bar {
      position: relative;
      min-height: 22px;
      padding: 3px 0;
      overflow: hidden;
      border-radius: 999px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.08);
    }

    .eagle-fill {
      display: flex;
      flex-wrap: nowrap;
      gap: 3px;
      align-items: center;
      min-height: 16px;
      padding: 0 8px;
      overflow: hidden;
      width: 100%;
    }

    .eagle {
      font-size: 14px;
      line-height: 1;
      filter: drop-shadow(0 1px 2px rgba(0,0,0,0.35));
      user-select: none;
    }

    .eagle.dim {
      opacity: 0.18;
    }

    .eagle.full {
      opacity: 0.95;
    }

    .actions {
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
      margin-top: 18px;
    }

    .subtle {
      font-size: 0.95rem;
      color: rgba(255,255,255,0.78);
    }

    @media (max-width: 860px) {
      body {
        padding: 16px;
      }

      .panel {
        padding: 24px 18px;
        border-radius: 22px;
      }

      .layout {
        grid-template-columns: 1fr;
        gap: 20px;
      }

      .media-wrap {
        order: 2;
      }

      .content {
        order: 1;
        text-align: center;
        align-items: center;
      }

      .hero {
        max-width: 300px;
        max-height: 460px;
      }

      .title-label {
        text-align: left;
      }

      .actions {
        justify-content: center;
      }

      .bg-tapestry::before,
      .bg-tapestry::after {
        width: 190%;
        left: -38%;
      }
    }
  </style>
</head>

<body>
  <div class="bg-tapestry"></div>

  <main class="shell">
    <section class="panel">
      <h1 class="title">¿Hoy juega el América?</h1>

      <div class="layout">
        <div class="media-wrap">
          <img id="imgSi" class="hero" src="hoy_juega_america.png" alt="Hoy juega el América">
          <img id="imgNo" class="hero" src="no_juega_america.png" alt="No juega el América">
          <img id="imgCruzAzulProx" class="hero" src="CAZ_prox_2026.jpeg" alt="Próximo partido contra Cruz Azul">
          <img id="imgCruzAzulHoy" class="hero" src="CAZ_hoy_2026.jpeg" alt="Hoy juega contra Cruz Azul">
        </div>

        <div class="content">
          <div id="status" class="status">Consultando...</div>
          <div id="details" class="details"></div>
          <div id="titlesInfo"></div>

          <div class="actions">
            <span class="subtle">Información automática del próximo partido</span>
          </div>
        </div>
      </div>
    </section>
  </main>

  <script>
    const TEAM_ID = "134193";
    const API_URL = `https://www.thesportsdb.com/api/v1/json/123/eventsnext.php?id=${TEAM_ID}`;
    const TZ = "America/Mexico_City";
    const AMERICA_TITLES = 16;
    const MAX_TITLES_FOR_BAR = 16;

    const LIGA_MX_TITLES = {
      "america": { name: "América", titles: 16 },
      "atlas": { name: "Atlas", titles: 3 },
      "atletico san luis": { name: "Atlético San Luis", titles: 0 },
      "san luis": { name: "Atlético San Luis", titles: 0 },
      "juarez": { name: "Juárez", titles: 0 },
      "fc juarez": { name: "Juárez", titles: 0 },
      "bravos": { name: "Juárez", titles: 0 },
      "guadalajara": { name: "Guadalajara", titles: 12 },
      "cd guadalajara": { name: "Guadalajara", titles: 12 },
      "chivas": { name: "Guadalajara", titles: 12 },
      "club guadalajara": { name: "Guadalajara", titles: 12 },
      "cruz azul": { name: "Cruz Azul", titles: 9 },
      "queretaro": { name: "Querétaro", titles: 0 },
      "queretaro fc": { name: "Querétaro", titles: 0 },
      "gallos blancos": { name: "Querétaro", titles: 0 },
      "leon": { name: "León", titles: 5 },
      "club leon": { name: "León", titles: 5 },
      "mazatlan": { name: "Mazatlán", titles: 0 },
      "mazatlan fc": { name: "Mazatlán", titles: 0 },
      "necaxa": { name: "Necaxa", titles: 3 },
      "club necaxa": { name: "Necaxa", titles: 3 },
      "pachuca": { name: "Pachuca", titles: 7 },
      "puebla": { name: "Puebla", titles: 2 },
      "unam": { name: "Pumas UNAM", titles: 7 },
      "pumas": { name: "Pumas UNAM", titles: 7 },
      "pumas unam": { name: "Pumas UNAM", titles: 7 },
      "club universidad nacional": { name: "Pumas UNAM", titles: 7 },
      "monterrey": { name: "Monterrey", titles: 5 },
      "rayados": { name: "Monterrey", titles: 5 },
      "santos laguna": { name: "Santos Laguna", titles: 6 },
      "tigres": { name: "Tigres UANL", titles: 8 },
      "tigres uanl": { name: "Tigres UANL", titles: 8 },
      "toluca": { name: "Toluca", titles: 12 },
      "tijuana": { name: "Tijuana", titles: 1 },
      "xolos": { name: "Tijuana", titles: 1 },
      "club tijuana": { name: "Tijuana", titles: 1 }
    };

    function getMexicoDate(date) {
      return new Intl.DateTimeFormat("en-CA", {
        timeZone: TZ,
        year: "numeric",
        month: "2-digit",
        day: "2-digit"
      }).format(date);
    }

    function formatMexicoDateTime(date) {
      return new Intl.DateTimeFormat("es-MX", {
        timeZone: TZ,
        weekday: "long",
        day: "numeric",
        month: "long",
        hour: "2-digit",
        minute: "2-digit"
      }).format(date);
    }

    function parseDate(event) {
      let raw = event.strTimestamp || `${event.dateEvent}T${event.strTime}`;
      if (!raw) return null;
      if (!raw.endsWith("Z")) raw += "Z";
      const d = new Date(raw);
      return isNaN(d) ? null : d;
    }

    function normalizeTeamName(name) {
      return (name || "")
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .toLowerCase()
        .replace(/\./g, "")
        .replace(/\s+/g, " ")
        .trim();
    }

    function isVsCruzAzul(event) {
      const home = normalizeTeamName(event.strHomeTeam);
      const away = normalizeTeamName(event.strAwayTeam);
      return home.includes("cruz azul") || away.includes("cruz azul");
    }

    function hideAllImages() {
      document.getElementById("imgSi").classList.remove("visible");
      document.getElementById("imgNo").classList.remove("visible");
      document.getElementById("imgCruzAzulProx").classList.remove("visible");
      document.getElementById("imgCruzAzulHoy").classList.remove("visible");
    }

    function showImage(mode) {
      hideAllImages();

      if (mode === "general-yes") {
        document.getElementById("imgSi").classList.add("visible");
      } else if (mode === "general-no") {
        document.getElementById("imgNo").classList.add("visible");
      } else if (mode === "caz-prox") {
        document.getElementById("imgCruzAzulProx").classList.add("visible");
      } else if (mode === "caz-hoy") {
        document.getElementById("imgCruzAzulHoy").classList.add("visible");
      }
    }

    function getOpponentName(event) {
      const home = normalizeTeamName(event.strHomeTeam);
      const away = normalizeTeamName(event.strAwayTeam);

      if (home.includes("america")) return event.strAwayTeam;
      if (away.includes("america")) return event.strHomeTeam;

      return event.strAwayTeam;
    }

    function findLigaMxTeam(rawName) {
      const normalized = normalizeTeamName(rawName);

      if (LIGA_MX_TITLES[normalized]) {
        return LIGA_MX_TITLES[normalized];
      }

      for (const key of Object.keys(LIGA_MX_TITLES)) {
        if (normalized.includes(key) || key.includes(normalized)) {
          return LIGA_MX_TITLES[key];
        }
      }

      return null;
    }

    function buildEagleBar(titles) {
      let html = '<div class="eagle-bar"><div class="eagle-fill">';
      for (let i = 0; i < MAX_TITLES_FOR_BAR; i++) {
        const cls = i < titles ? 'full' : 'dim';
        html += `<span class="eagle ${cls}">🦅</span>`;
      }
      html += '</div></div>';
      return html;
    }

    function renderTitlesInfo(event) {
      const titlesInfo = document.getElementById("titlesInfo");
      titlesInfo.innerHTML = "";

      const opponentRaw = getOpponentName(event);
      const opponent = findLigaMxTeam(opponentRaw);

      if (!opponent) return;

      titlesInfo.innerHTML = `
        <div class="titles-box">
          <div class="titles-heading">Títulos de liga</div>

          <div class="title-row">
            <div class="title-label">
              <span>América</span>
              <strong>${AMERICA_TITLES}</strong>
            </div>
            ${buildEagleBar(AMERICA_TITLES)}
          </div>

          <div class="title-row">
            <div class="title-label">
              <span>${opponent.name}</span>
              <strong>${opponent.titles}</strong>
            </div>
            ${buildEagleBar(opponent.titles)}
          </div>
        </div>
      `;
    }

    function setReferenceTime(dateText) {
      const details = document.getElementById("details");
      const refHtml = `<div class="reference-time">Hora de referencia: ${dateText} (Ciudad de México)</div>`;
      details.innerHTML += refHtml;
    }

    async function loadMatch() {
      const status = document.getElementById("status");
      const details = document.getElementById("details");
      const titlesInfo = document.getElementById("titlesInfo");

      status.textContent = "Consultando...";
      status.className = "status";
      details.innerHTML = "";
      titlesInfo.innerHTML = "";
      hideAllImages();

      try {
        const res = await fetch(API_URL);
        const data = await res.json();

        if (!data.events || data.events.length === 0) {
          status.textContent = "Sin datos";
          status.className = "status no";
          showImage("general-no");
          details.innerHTML = `No se encontró información del próximo partido.`;
          return;
        }

        const event = data.events[0];
        const date = parseDate(event);

        if (!date) {
          status.textContent = "Error en fecha";
          status.className = "status no";
          showImage("general-no");
          details.innerHTML = `No fue posible interpretar la fecha del partido.`;
          return;
        }

        const today = getMexicoDate(new Date());
        const eventDate = getMexicoDate(date);
        const finished = (event.strStatus || "").includes("Finished");
        const cruzAzulMatch = isVsCruzAzul(event);

        const matchText = `${event.strHomeTeam} vs ${event.strAwayTeam}`;
        const dateText = formatMexicoDateTime(date);

        if (eventDate > today) {
          status.textContent = "No juega hoy";
          status.className = "status no";

          if (cruzAzulMatch) {
            showImage("caz-prox");
          } else {
            showImage("general-no");
          }

          details.innerHTML = `
            <div><b>Próximo partido</b></div>
            <div class="meta-line">${matchText}</div>
          `;
          setReferenceTime(dateText);
          renderTitlesInfo(event);

        } else if (eventDate === today) {
          if (finished) {
            status.textContent = "Ya jugó hoy";
            status.className = "status no";
            showImage("general-no");

            details.innerHTML = `
              <div><b>${matchText}</b></div>
            `;
            setReferenceTime(dateText);
          } else {
            status.textContent = "Hoy juega";
            status.className = "status yes";

            if (cruzAzulMatch) {
              showImage("caz-hoy");
            } else {
              showImage("general-yes");
            }

            details.innerHTML = `
              <div><b>${matchText}</b></div>
              <div class="meta-line" style="margin-top:12px;">Partido programado para hoy</div>
            `;
            setReferenceTime(dateText);
          }

          renderTitlesInfo(event);

        } else {
          status.textContent = "No juega hoy";
          status.className = "status no";
          showImage("general-no");

          details.innerHTML = `
            <div><b>Último partido registrado</b></div>
            <div class="meta-line">${matchText}</div>
          `;
          setReferenceTime(dateText);
          renderTitlesInfo(event);
        }

      } catch (err) {
        status.textContent = "Error al cargar";
        status.className = "status no";
        showImage("general-no");
        details.innerHTML = `No fue posible cargar la información del partido.`;
        console.error(err);
      }
    }

    loadMatch();
  </script>
</body>
</html>
