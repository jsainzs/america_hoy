<script>
const TEAM_ID = "134193";
const API_URL = `https://www.thesportsdb.com/api/v1/json/123/eventsnext.php?id=${TEAM_ID}`;
const TZ = "America/Mexico_City";

const AMERICA_TITLES = 16;
const MAX_TITLES_FOR_BAR = 16;

const LIGA_MX_TITLES = {
  "america": { name: "América", titles: 16, icon: "🦅" },
  "atlas": { name: "Atlas", titles: 3, icon: "🦊" },
  "atletico san luis": { name: "Atlético San Luis", titles: 0, icon: "⚪" },
  "juarez": { name: "Juárez", titles: 0, icon: "🐎" },
  "chivas": { name: "Guadalajara", titles: 12, icon: "🐐" },
  "guadalajara": { name: "Guadalajara", titles: 12, icon: "🐐" },
  "cruz azul": { name: "Cruz Azul", titles: 9, icon: "🔵" },
  "queretaro": { name: "Querétaro", titles: 0, icon: "🐓" },
  "leon": { name: "León", titles: 5, icon: "🦁" },
  "mazatlan": { name: "Mazatlán", titles: 0, icon: "⚓" },
  "necaxa": { name: "Necaxa", titles: 3, icon: "⚡" },
  "pachuca": { name: "Pachuca", titles: 7, icon: "🏛️" },
  "puebla": { name: "Puebla", titles: 2, icon: "🎽" },
  "pumas": { name: "Pumas UNAM", titles: 7, icon: "🐾" },
  "monterrey": { name: "Monterrey", titles: 5, icon: "⛰️" },
  "santos laguna": { name: "Santos Laguna", titles: 6, icon: "👑" },
  "tigres": { name: "Tigres UANL", titles: 8, icon: "🐯" },
  "toluca": { name: "Toluca", titles: 12, icon: "😈" },
  "tijuana": { name: "Tijuana", titles: 1, icon: "🐕" }
};

function getMexicoDate(date) {
  return new Intl.DateTimeFormat("en-CA", {
    timeZone: TZ,
    year: "numeric",
    month: "2-digit",
    day: "2-digit"
  }).format(date);
}

function formatMexicoDateTime(date) {
  return new Intl.DateTimeFormat("es-MX", {
    timeZone: TZ,
    weekday: "long",
    day: "numeric",
    month: "long",
    hour: "2-digit",
    minute: "2-digit"
  }).format(date);
}

function parseDate(event) {
  let raw = event.strTimestamp || `${event.dateEvent}T${event.strTime}`;
  if (!raw) return null;
  if (!raw.endsWith("Z")) raw += "Z";
  const d = new Date(raw);
  return isNaN(d) ? null : d;
}

function normalize(name) {
  return (name || "")
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g, "")
    .toLowerCase()
    .replace(/\./g, "")
    .trim();
}

function isVsCruzAzul(event) {
  const h = normalize(event.strHomeTeam);
  const a = normalize(event.strAwayTeam);
  return h.includes("cruz azul") || a.includes("cruz azul");
}

function getOpponent(event) {
  const h = normalize(event.strHomeTeam);
  const a = normalize(event.strAwayTeam);
  if (h.includes("america")) return event.strAwayTeam;
  return event.strHomeTeam;
}

function findTeam(name) {
  const n = normalize(name);
  if (LIGA_MX_TITLES[n]) return LIGA_MX_TITLES[n];
  for (let k in LIGA_MX_TITLES) {
    if (n.includes(k) || k.includes(n)) return LIGA_MX_TITLES[k];
  }
  return null;
}

function hideAllImages() {
  document.querySelectorAll(".hero").forEach(i => i.classList.remove("visible"));
}

function showImage(type) {
  hideAllImages();
  if (type === "yes") imgSi.classList.add("visible");
  if (type === "no") imgNo.classList.add("visible");
  if (type === "caz-prox") imgCruzAzulProx.classList.add("visible");
  if (type === "caz-hoy") imgCruzAzulHoy.classList.add("visible");
}

function buildBar(titles, icon) {
  const pct = (titles / MAX_TITLES_FOR_BAR) * 100;
  return `
    <div class="bar-track">
      <div class="bar-fill" style="width:${pct}%"></div>
      <div class="bar-icon" style="left:${pct}%">${icon}</div>
    </div>
  `;
}

function renderTitles(event) {
  const box = document.getElementById("titlesInfo");
  box.innerHTML = "";

  const opp = findTeam(getOpponent(event));
  if (!opp) return;

  box.innerHTML = `
    <div class="titles-box">
      <div class="titles-heading">Títulos de liga</div>

      <div class="title-row">
        <div class="title-label"><span>América</span><strong>${AMERICA_TITLES}</strong></div>
        ${buildBar(AMERICA_TITLES, "🦅")}
      </div>

      <div class="title-row">
        <div class="title-label"><span>${opp.name}</span><strong>${opp.titles}</strong></div>
        ${buildBar(opp.titles, opp.icon)}
      </div>
    </div>
  `;
}

function renderFunFact(event) {
  const box = document.getElementById("funFact");
  box.innerHTML = "";

  if (!isVsCruzAzul(event)) return;

  box.innerHTML = `
    <div class="confidential-box">
      <div class="confidential-title">Archivo confidencial del americanismo</div>
      <div class="confidential-text">
        Por ahí de 1988 fuimos a un América-Cruz Azul de liga, hora y media antes del partido,
        en zona baja detrás de una portería. Pablo Larios calentaba. Íbamos mi primo Marco,
        su papá Jorge y yo. Jorge anunció: “Van a ver que me conoce”, y empezó a gritar:
        “¡Pablo, Pablo!”. Al fin, Larios volteó apenas, saludó con desgano y de reojo.
        Jorge aceleró para buscar lugar y dictó sentencia: “Ya no le vuelvo a prestar dinero”.
      </div>
    </div>
  `;
}

function setReference(dateText) {
  document.getElementById("details").innerHTML +=
    `<div class="reference-time">Hora de referencia: ${dateText}</div>`;
}

async function loadMatch() {
  const status = document.getElementById("status");
  const details = document.getElementById("details");

  status.textContent = "Consultando...";
  details.innerHTML = "";
  document.getElementById("titlesInfo").innerHTML = "";
  document.getElementById("funFact").innerHTML = "";
  hideAllImages();

  try {
    const res = await fetch(API_URL);
    const data = await res.json();
    const event = data.events[0];
    const date = parseDate(event);

    const today = getMexicoDate(new Date());
    const eventDate = getMexicoDate(date);
    const cruz = isVsCruzAzul(event);

    const match = `${event.strHomeTeam} vs ${event.strAwayTeam}`;
    const dateText = formatMexicoDateTime(date);

    if (eventDate > today) {
      status.textContent = "No juega hoy";
      status.className = "status no";
      showImage(cruz ? "caz-prox" : "no");

      details.innerHTML = `
        <b>Próximo partido</b><br>
        <span class="meta-line">${match}</span>
      `;
      setReference(dateText);
    }

    else if (eventDate === today) {
      status.textContent = "Hoy juega";
      status.className = "status yes";
      showImage(cruz ? "caz-hoy" : "yes");

      details.innerHTML = `<b>${match}</b>`;
      setReference(dateText);
    }

    else {
      status.textContent = "No juega hoy";
      status.className = "status no";
      showImage("no");
    }

    renderTitles(event);
    renderFunFact(event);

  } catch (e) {
    status.textContent = "Error";
    showImage("no");
  }
}

loadMatch();
</script>
