<script>
  const TEAM_ID = "134193";
  const NEXT_URL = `https://www.thesportsdb.com/api/v1/json/123/eventsnext.php?id=${TEAM_ID}`;
  const MEXICO_TZ = "America/Mexico_City";

  let lastDebug = null;

  function getTodayInMexico() {
    return new Intl.DateTimeFormat("en-CA", {
      timeZone: MEXICO_TZ,
      year: "numeric",
      month: "2-digit",
      day: "2-digit"
    }).format(new Date());
  }

  function getMexicoDateString(date) {
    return new Intl.DateTimeFormat("en-CA", {
      timeZone: MEXICO_TZ,
      year: "numeric",
      month: "2-digit",
      day: "2-digit"
    }).format(date);
  }

  function formatLongDateTimeInMexico(date) {
    return new Intl.DateTimeFormat("es-MX", {
      timeZone: MEXICO_TZ,
      weekday: "long",
      day: "numeric",
      month: "long",
      hour: "2-digit",
      minute: "2-digit",
      hour12: false
    }).format(date);
  }

  function parseEventDate(event) {
    if (event.strTimestamp) {
      let raw = event.strTimestamp.trim();
      const hasTimezone = /(?:Z|[+-]\d{2}:\d{2})$/.test(raw);
      if (!hasTimezone) raw += "Z";

      const d = new Date(raw);
      if (!Number.isNaN(d.getTime())) return d;
    }

    if (event.dateEvent && event.strTime) {
      const d = new Date(`${event.dateEvent}T${event.strTime}Z`);
      if (!Number.isNaN(d.getTime())) return d;
    }

    if (event.dateEvent) {
      const d = new Date(`${event.dateEvent}T12:00:00Z`);
      if (!Number.isNaN(d.getTime())) return d;
    }

    return null;
  }

  function buildMatchHtml(prefix, event, kickoffUtc, labelText) {
    const home = event.strHomeTeam || "Equipo local";
    const away = event.strAwayTeam || "Equipo visitante";
    const league = event.strLeague || "Competencia no especificada";
    const longDate = kickoffUtc
      ? formatLongDateTimeInMexico(kickoffUtc)
      : "Fecha no disponible";

    return `
      <div class="match-line">${prefix}${home} vs ${away}</div>
      <div class="comp-line">${league}</div>
      <div class="time-line">${longDate}${kickoffUtc ? " (hora de CDMX)" : ""}</div>
      <div class="label">${labelText}</div>
    `;
  }

  function showOnlyImage(showYes) {
    const imgSi = document.getElementById("imgSi");
    const imgNo = document.getElementById("imgNo");

    imgSi.classList.remove("visible");
    imgNo.classList.remove("visible");

    if (showYes) {
      imgSi.classList.add("visible");
    } else {
      imgNo.classList.add("visible");
    }
  }

  function setTag(text, mode) {
    const tag = document.getElementById("statusTag");
    tag.textContent = text;
    tag.className = `status-tag ${mode}`;
  }

  function setLoading(message = "Consultando información del partido...") {
    document.getElementById("details").innerHTML = message;
    setTag("Consultando", "status-loading");
    document.getElementById("imgSi").classList.remove("visible");
    document.getElementById("imgNo").classList.remove("visible");
  }

  function setStatus(tagText, tagMode, showYesImage, detailsHtml) {
    setTag(tagText, tagMode);
    showOnlyImage(showYesImage);
    document.getElementById("details").innerHTML = detailsHtml || "";
  }

  function setError(message) {
    setTag("No se pudo consultar", "status-no");
    document.getElementById("details").innerHTML = `
      <div class="match-line">No se pudo cargar la información</div>
      <div class="time-line">${message}</div>
    `;
    document.getElementById("imgSi").classList.remove("visible");
    document.getElementById("imgNo").classList.remove("visible");
  }

  async function loadMatchStatus() {
    setLoading();

    try {
      const response = await fetch(NEXT_URL);
      if (!response.ok) throw new Error(`HTTP ${response.status}`);

      const data = await response.json();

      if (!data.events || !Array.isArray(data.events) || data.events.length === 0) {
        setStatus(
          "Sin datos",
          "status-no",
          false,
          `
            <div class="match-line">No se encontró información de partidos</div>
            <div class="time-line">La respuesta del servicio llegó vacía.</div>
          `
        );
        return;
      }

      const event = data.events[0];
      const kickoffUtc = parseEventDate(event);

      if (!kickoffUtc) {
        throw new Error("No se pudo interpretar la fecha del partido.");
      }

      const todayInMexico = getTodayInMexico();
      const eventDateMexico = getMexicoDateString(kickoffUtc);
      const isFinished = (event.strStatus || "").toLowerCase().includes("finished");

      let tagText = "No hay partido hoy";
      let tagMode = "status-no";
      let showYesImage = false;
      let detailsHtml = "";

      if (eventDateMexico > todayInMexico) {
        tagText = "No hay partido hoy";
        tagMode = "status-no";
        showYesImage = false;
        detailsHtml = buildMatchHtml(
          "Próximo partido: ",
          event,
          kickoffUtc,
          "El próximo partido no es hoy"
        );
      } else if (eventDateMexico === todayInMexico) {
        if (isFinished) {
          tagText = "Ya jugó hoy";
          tagMode = "status-no";
          showYesImage = false;
          detailsHtml = buildMatchHtml(
            "",
            event,
            kickoffUtc,
            "Ese partido ya pasó hoy"
          );
        } else {
          tagText = "Hoy juega";
          tagMode = "status-yes";
          showYesImage = true;
          detailsHtml = buildMatchHtml(
            "",
            event,
            kickoffUtc,
            "Partido programado para hoy"
          );
        }
      } else {
        tagText = "No hay partido hoy";
        tagMode = "status-no";
        showYesImage = false;
        detailsHtml = buildMatchHtml(
          "Último partido detectado: ",
          event,
          kickoffUtc,
          "El evento devuelto ya quedó atrás"
        );
      }

      lastDebug = {
        todayInMexico,
        eventDateMexico,
        eventUtc: kickoffUtc.toISOString(),
        status: event.strStatus || null,
        home: event.strHomeTeam,
        away: event.strAwayTeam
      };

      setStatus(tagText, tagMode, showYesImage, detailsHtml);

      document.getElementById("footer").textContent =
        `Última actualización: ${new Intl.DateTimeFormat("es-MX", {
          timeZone: MEXICO_TZ,
          dateStyle: "medium",
          timeStyle: "short"
        }).format(new Date())}`;

    } catch (error) {
      setError(error.message);
    }
  }

  function showDebugInfo() {
    if (!lastDebug) {
      alert("Aún no hay datos cargados.");
      return;
    }

    alert([
      `todayInMexico: ${lastDebug.todayInMexico}`,
      `eventDateMexico: ${lastDebug.eventDateMexico}`,
      `eventUtc: ${lastDebug.eventUtc}`,
      `status: ${lastDebug.status}`,
      `partido: ${lastDebug.home} vs ${lastDebug.away}`
    ].join("\n"));
  }

  loadMatchStatus();
</script>
