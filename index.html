<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>¿Hoy juega el América?</title>

<style>
:root{
  --text:#f8fafc;
  --accent:#facc15;
  --bg-blue:#0a1f44;
  --bg-blue-2:#16386e;
  --bg-cream:#f3cf18;
}

body{
  margin:0;
  font-family:Arial,Helvetica,sans-serif;
  background: linear-gradient(135deg,var(--bg-blue),var(--bg-blue-2),var(--bg-cream));
  color:var(--text);
}

.shell{
  max-width:1000px;
  margin:auto;
  padding:30px;
  text-align:center;
}

.title{
  font-size:2.8rem;
  font-weight:800;
}

/* contador */
.visit-counter{
  margin:20px auto;
  padding:8px 16px;
  border-radius:20px;
  background:rgba(250,204,21,.2);
  display:inline-block;
  font-weight:bold;
}

.memorama-link{
  display:inline-block;
  margin-top:20px;
  padding:10px 18px;
  background:#facc15;
  color:#0a1f44;
  text-decoration:none;
  border-radius:10px;
  font-weight:bold;
}
</style>
</head>

<body>

<main class="shell">

<h1 class="title">¿Hoy juega el América?</h1>

<!-- CONTADOR -->
<div class="visit-counter">
  👀 Visitas: <span id="visits">...</span>
</div>

<div id="status">Consultando...</div>

<a href="https://jsainzs.github.io/memory-game-udacity/" class="memorama-link">
  Ejercita tu memoria, papá
</a>

</main>

<!-- SCRIPT DEL CONTADOR (CLAVE) -->
<script>
document.addEventListener("DOMContentLoaded", function() {
  const el = document.getElementById('visits');

  fetch('https://api.countapi.xyz/hit/jsainzs/america_hoy')
    .then(res => res.json())
    .then(res => {
      el.innerText = res.value;
    })
    .catch(err => {
      console.error("Error contador:", err);
      el.innerText = "—";
    });
});
</script>

</body>
</html>
