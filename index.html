<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>¿Hoy juega el América?</title>

  <style>
    :root {
      --bg: #08111f;
      --bg-2: #132238;
      --card: rgba(10, 18, 32, 0.9);
      --text: #f8fafc;
      --muted: #cbd5e1;
      --accent: #facc15;
      --green: #16a34a;
      --red: #dc2626;
    }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(135deg, var(--bg), var(--bg-2));
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }

    .card {
      width: 100%;
      max-width: 700px;
      background: var(--card);
      border-radius: 20px;
      padding: 24px;
      text-align: center;
      box-shadow: 0 20px 50px rgba(0,0,0,0.4);
    }

    h1 {
      margin: 0 0 10px;
      font-size: 2.2rem;
    }

    .status {
      margin: 15px 0;
      font-size: 1.6rem;
      font-weight: bold;
    }

    .yes { color: var(--green); }
    .no { color: var(--red); }

    .hero {
      display: none;
      width: 100%;
      max-height: 400px;
      object-fit: contain;
      border-radius: 12px;
      margin-top: 10px;
    }

    .hero.visible {
      display: block;
    }

    .details {
      margin-top: 15px;
      color: var(--muted);
      font-size: 1rem;
    }

    button {
      margin-top: 15px;
      padding: 10px 16px;
      border: none;
      border-radius: 10px;
      background: var(--accent);
      font-weight: bold;
      cursor: pointer;
    }
  </style>
</head>

<body>
  <div class="card">
    <h1>¿Hoy juega el América?</h1>

    <div id="status" class="status">Consultando...</div>

    <img id="imgSi" class="hero" src="hoy_juega_america.png">
    <img id="imgNo" class="hero" src="no_juega_america.png">

    <div id="details" class="details"></div>

    <button onclick="loadMatch()">Actualizar</button>
  </div>

  <script>
    const TEAM_ID = "134193";
    const API_URL = `https://www.thesportsdb.com/api/v1/json/123/eventsnext.php?id=${TEAM_ID}`;
    const TZ = "America/Mexico_City";

    function getMexicoDate(date) {
      return new Intl.DateTimeFormat("en-CA", {
        timeZone: TZ,
        year: "numeric",
        month: "2-digit",
        day: "2-digit"
      }).format(date);
    }

    function formatMexicoDateTime(date) {
      return new Intl.DateTimeFormat("es-MX", {
        timeZone: TZ,
        weekday: "long",
        day: "numeric",
        month: "long",
        hour: "2-digit",
        minute: "2-digit"
      }).format(date);
    }

    function parseDate(event) {
      let raw = event.strTimestamp || `${event.dateEvent}T${event.strTime}`;

      if (!raw) return null;

      if (!raw.endsWith("Z")) raw += "Z";

      const d = new Date(raw);
      return isNaN(d) ? null : d;
    }

    function showImage(isPlaying) {
      document.getElementById("imgSi").classList.remove("visible");
      document.getElementById("imgNo").classList.remove("visible");

      if (isPlaying) {
        document.getElementById("imgSi").classList.add("visible");
      } else {
        document.getElementById("imgNo").classList.add("visible");
      }
    }

    async function loadMatch() {
      const status = document.getElementById("status");
      const details = document.getElementById("details");

      status.textContent = "Consultando...";
      details.innerHTML = "";

      try {
        const res = await fetch(API_URL);
        const data = await res.json();

        if (!data.events || data.events.length === 0) {
          status.textContent = "Sin datos";
          return;
        }

        const event = data.events[0];
        const date = parseDate(event);

        if (!date) {
          status.textContent = "Error en fecha";
          return;
        }

        const today = getMexicoDate(new Date());
        const eventDate = getMexicoDate(date);
        const finished = (event.strStatus || "").includes("Finished");

        const matchText = `${event.strHomeTeam} vs ${event.strAwayTeam}`;
        const dateText = formatMexicoDateTime(date);

        if (eventDate > today) {
          status.textContent = "No juega hoy";
          status.className = "status no";
          showImage(false);

          details.innerHTML = `
            Próximo partido:<br><b>${matchText}</b><br>${dateText}
          `;
        }

        else if (eventDate === today) {
          if (finished) {
            status.textContent = "Ya jugó hoy";
            status.className = "status no";
            showImage(false);

            details.innerHTML = `
              ${matchText}<br>${dateText}
            `;
          } else {
            status.textContent = "Hoy juega";
            status.className = "status yes";
            showImage(true);

            details.innerHTML = `
              ${matchText}<br>${dateText}
            `;
          }
        }

        else {
          status.textContent = "No juega hoy";
          status.className = "status no";
          showImage(false);

          details.innerHTML = `
            Último partido:<br><b>${matchText}</b><br>${dateText}
          `;
        }

      } catch (err) {
        status.textContent = "Error al cargar";
        console.error(err);
      }
    }

    loadMatch();
  </script>
</body>
</html>
