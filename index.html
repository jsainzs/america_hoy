<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>¿Hoy juega el América?</title>
  <style>
    :root {
      --bg: #08111f;
      --bg-2: #132238;
      --card: rgba(10, 18, 32, 0.9);
      --card-border: rgba(255,255,255,0.08);
      --text: #f8fafc;
      --muted: #cbd5e1;
      --muted-2: #94a3b8;
      --accent: #facc15;
      --accent-soft: rgba(250, 204, 21, 0.14);
      --blue-soft: rgba(29, 78, 216, 0.16);
      --green-soft: rgba(22, 163, 74, 0.16);
      --red-soft: rgba(220, 38, 38, 0.16);
      --green-text: #bbf7d0;
      --red-text: #fecaca;
      --blue-text: #bfdbfe;
      --shadow: 0 24px 60px rgba(0,0,0,0.42);
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      min-height: 100%;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top, rgba(250, 204, 21, 0.08), transparent 28%),
        linear-gradient(135deg, var(--bg), var(--bg-2));
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    .card {
      width: 100%;
      max-width: 760px;
      background: var(--card);
      border: 1px solid var(--card-border);
      border-radius: 24px;
      padding: 18px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(8px);
      text-align: center;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      padding: 7px 12px;
      border-radius: 999px;
      background: var(--accent-soft);
      color: var(--accent);
      font-weight: 700;
      font-size: 0.92rem;
      letter-spacing: 0.3px;
    }

    .status-tag {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 34px;
      padding: 7px 12px;
      border-radius: 999px;
      font-size: 0.78rem;
      font-weight: 800;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      border: 1px solid transparent;
    }

    .status-loading {
      background: var(--blue-soft);
      color: var(--blue-text);
      border-color: rgba(29, 78, 216, 0.3);
    }

    .status-yes {
      background: var(--green-soft);
      color: var(--green-text);
      border-color: rgba(22, 163, 74, 0.34);
    }

    .status-no {
      background: var(--red-soft);
      color: var(--red-text);
      border-color: rgba(220, 38, 38, 0.34);
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(1.8rem, 4vw, 2.8rem);
      line-height: 1.05;
      letter-spacing: -0.02em;
    }

    .subtitle {
      margin: 0 0 14px;
      color: var(--muted);
      font-size: 0.98rem;
      line-height: 1.35;
    }

    .hero-wrap {
      width: 100%;
      margin-bottom: 14px;
    }

    .hero {
      display: none;
      width: 100%;
      max-height: 62vh;
      object-fit: contain;
      border-radius: 18px;
      box-shadow: 0 14px 34px rgba(0,0,0,0.33);
      background: rgba(255,255,255,0.02);
    }

    .hero.visible {
      display: block;
      animation: fadeIn 0.35s ease;
    }

    .details {
      padding: 14px 16px;
      border-radius: 18px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.05);
      color: var(--muted);
      font-size: 0.98rem;
      line-height: 1.5;
      min-height: 96px;
      margin-bottom: 14px;
    }

    .details .match-line {
      color: white;
      font-size: 1.1rem;
      font-weight: 800;
      margin-bottom: 6px;
      line-height: 1.3;
    }

    .details .comp-line {
      color: #e2e8f0;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .details .time-line {
      color: var(--muted);
    }

    .details .label {
      display: inline-block;
      margin-top: 8px;
      font-size: 0.84rem;
      color: var(--muted-2);
    }

    .controls {
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }

    button {
      border: none;
      border-radius: 12px;
      padding: 11px 16px;
      font-size: 0.94rem;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.15s ease, filter 0.15s ease;
    }

    button:hover {
      transform: translateY(-1px);
      filter: brightness(1.04);
    }

    button:active {
      transform: translateY(0);
    }

    .primary {
      background: var(--accent);
      color: #111827;
    }

    .secondary {
      background: #1d4ed8;
      color: white;
    }

    .footer {
      font-size: 0.84rem;
      color: var(--muted-2);
      line-height: 1.35;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 640px) {
      body { padding: 10px; }

      .card {
        padding: 14px;
        border-radius: 18px;
      }

      .topbar { justify-content: center; }

      h1 { font-size: clamp(1.55rem, 6vw, 2.15rem); }

      .subtitle { font-size: 0.9rem; }

      .hero { max-height: 64vh; }

      .details {
        font-size: 0.92rem;
        min-height: 84px;
        padding: 12px;
      }

      .details .match-line { font-size: 1rem; }

      button {
        flex: 1 1 0;
        min-width: 140px;
      }
    }

    @media (max-height: 760px) {
      h1 { font-size: clamp(1.5rem, 3vw, 2rem); }

      .subtitle {
        margin-bottom: 10px;
        font-size: 0.9rem;
      }

      .hero { max-height: 48vh; }

      .details {
        min-height: 78px;
        font-size: 0.9rem;
        padding: 11px 12px;
      }

      .footer { font-size: 0.76rem; }
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="topbar">
      <div class="badge">Club América</div>
      <div id="statusTag" class="status-tag status-loading">Consultando</div>
    </div>

    <h1>¿Hoy juega el América?</h1>
    <p class="subtitle">Para que sepas si hoy juega, si ya jugó, o cuál es el siguiente partido.</p>

    <div class="hero-wrap">
      <img id="imgSi" class="hero" src="hoy_juega_america.png" alt="Hoy juega el América">
      <img id="imgNo" class="hero" src="no_juega_america.png" alt="Hoy no juega el América">
    </div>

    <div id="details" class="details">
      Cargando información del partido...
    </div>

    <div class="controls">
      <button class="primary" onclick="loadMatchStatus()">Actualizar</button>
      <button class="secondary" onclick="showDebugInfo()">Ver diagnóstico</button>
    </div>

    <div class="footer" id="footer">
      Fuente: TheSportsDB y conversión a hora de CDMX.
    </div>
  </main>

  <script>
    const TEAM_ID = "134193";
    const NEXT_URL = `https://www.thesportsdb.com/api/v1/json/123/eventsnext.php?id=${TEAM_ID}`;
    const LAST_URL = `https://www.thesportsdb.com/api/v1/json/123/eventslast.php?id=${TEAM_ID}`;
    const MEXICO_TZ = "America/Mexico_City";

    let lastDebug = null;

    function formatDateInTimeZone(date, timeZone) {
      return new Intl.DateTimeFormat("en-CA", {
        timeZone,
        year: "numeric",
        month: "2-digit",
        day: "2-digit"
      }).format(date);
    }

    function formatLongDateTimeInMexico(date) {
      return new Intl.DateTimeFormat("es-MX", {
        timeZone: MEXICO_TZ,
        weekday: "long",
        day: "numeric",
        month: "long",
        hour: "2-digit",
        minute: "2-digit",
        hour12: false
      }).format(date);
    }

    function showOnlyImage(showYes) {
      const imgSi = document.getElementById("imgSi");
      const imgNo = document.getElementById("imgNo");

      imgSi.classList.remove("visible");
      imgNo.classList.remove("visible");

      if (showYes) {
        imgSi.classList.add("visible");
      } else {
        imgNo.classList.add("visible");
      }
    }

    function setTag(text, mode) {
      const tag = document.getElementById("statusTag");
      tag.textContent = text;
      tag.className = `status-tag ${mode}`;
    }

    function setLoading(message = "Consultando información del partido...") {
      document.getElementById("details").innerHTML = message;
      setTag("Consultando", "status-loading");
      document.getElementById("imgSi").classList.remove("visible");
      document.getElementById("imgNo").classList.remove("visible");
    }

    function setStatus(tagText, tagMode, showYesImage, detailsHtml) {
      setTag(tagText, tagMode);
      showOnlyImage(showYesImage);
      document.getElementById("details").innerHTML = detailsHtml || "";
    }

    function setError(message) {
      setTag("No se pudo consultar", "status-no");
      document.getElementById("details").innerHTML = `
        <div class="match-line">No se pudo cargar la información</div>
        <div class="time-line">${message}</div>
      `;
      document.getElementById("imgSi").classList.remove("visible");
      document.getElementById("imgNo").classList.remove("visible");
    }

    function buildUtcDateFromEvent(event) {
      if (!event.dateEvent || !event.strTime) return null;
      return new Date(`${event.dateEvent}T${event.strTime}Z`);
    }
    function isSameMexicoDate(dateA, dateB) {
  return formatDateInTimeZone(dateA, MEXICO_TZ) === formatDateInTimeZone(dateB, MEXICO_TZ);
}

    function hasLikelyPassed(kickoffUtc, now = new Date()) {
      // margen de 3 horas para no marcar demasiado pronto
      const threeHoursMs = 3 * 60 * 60 * 1000;
      return now.getTime() > (kickoffUtc.getTime() + threeHoursMs);
    }
    
    function buildMatchHtml(prefix, event, kickoffUtc, labelText) {
      const home = event.strHomeTeam || "Equipo local";
      const away = event.strAwayTeam || "Equipo visitante";
      const league = event.strLeague || "Competencia no especificada";
      const longDate = formatLongDateTimeInMexico(kickoffUtc);
    
      return `
        <div class="match-line">${prefix}${home} vs ${away}</div>
        <div class="comp-line">${league}</div>
        <div class="time-line">${longDate} (hora de CDMX)</div>
        <div class="label">${labelText}</div>
      `;
    }
        function getMexicoNowParts() {
          const now = new Date();
          const todayInMexico = formatDateInTimeZone(now, MEXICO_TZ);
          return { now, todayInMexico };
        }
    
        async function loadMatchStatus() {
          setLoading();
    
          try {
            const response = await fetch(API_URL);
            if (!response.ok) {
              throw new Error(`HTTP ${response.status}`);
            }
    
            const data = await response.json();
    
            if (!data.events || data.events.length === 0) {
              setStatus(
                "Sin datos",
                "status-no",
                false,
                `
                  <div class="match-line">No se encontró un partido próximo</div>
                  <div class="time-line">La respuesta del servicio llegó vacía.</div>
                `
              );
              return;
            }

        const event = data.events[0];
        const kickoffUtc = buildUtcDateFromEvent(event);

        if (!kickoffUtc || Number.isNaN(kickoffUtc.getTime())) {
          throw new Error("La fecha u hora del partido no se pudo interpretar.");
        }

        const { now, todayInMexico } = getMexicoNowParts();
        const matchDateInMexico = formatDateInTimeZone(kickoffUtc, MEXICO_TZ);
        const isTodayInMexico = todayInMexico === matchDateInMexico;

        const home = event.strHomeTeam || "Equipo local";
        const away = event.strAwayTeam || "Equipo visitante";
        const league = event.strLeague || "Competencia no especificada";
        const longDate = formatLongDateTimeInMexico(kickoffUtc);

        // margen de 3 horas para no marcar como "ya pasó" un partido que aún podría estar en curso
        const threeHoursMs = 3 * 60 * 60 * 1000;
        const eventHasLikelyPassed = now.getTime() > (kickoffUtc.getTime() + threeHoursMs);

        let tagText = "No hay partido hoy";
        let tagMode = "status-no";
        let showYesImage = false;
        let detailsHtml = "";

        if (isTodayInMexico && !eventHasLikelyPassed) {
          tagText = "Hoy juega";
          tagMode = "status-yes";
          showYesImage = true;

          detailsHtml = `
            <div class="match-line">${home} vs ${away}</div>
            <div class="comp-line">${league}</div>
            <div class="time-line">${longDate} (hora de CDMX)</div>
            <div class="label">Partido programado para hoy</div>
          `;
        } else if (isTodayInMexico && eventHasLikelyPassed) {
          tagText = "Ya jugó hoy";
          tagMode = "status-no";
          showYesImage = false;

          detailsHtml = `
            <div class="match-line">${home} vs ${away}</div>
            <div class="comp-line">${league}</div>
            <div class="time-line">${longDate} (hora de CDMX)</div>
            <div class="label">Ese partido ya pasó hoy</div>
          `;
        } else {
          tagText = "No hay partido hoy";
          tagMode = "status-no";
          showYesImage = false;

          detailsHtml = `
            <div class="match-line">Próximo partido: ${home} vs ${away}</div>
            <div class="comp-line">${league}</div>
            <div class="time-line">${longDate} (hora de CDMX)</div>
            <div class="label">El próximo partido no es hoy</div>
          `;
        }

        lastDebug = {
          rawEvent: event,
          todayInMexico,
          matchDateInMexico,
          kickoffUtc: kickoffUtc.toISOString(),
          isTodayInMexico,
          eventHasLikelyPassed,
          nowUtc: now.toISOString()
        };

        setStatus(tagText, tagMode, showYesImage, detailsHtml);

        document.getElementById("footer").textContent =
          `Última actualización: ${new Intl.DateTimeFormat("es-MX", {
            timeZone: MEXICO_TZ,
            dateStyle: "medium",
            timeStyle: "short"
          }).format(new Date())}`;
      } catch (error) {
        setError(error.message);
      }
    }

    function showDebugInfo() {
      if (!lastDebug) {
        alert("Aún no hay datos cargados.");
        return;
      }
    
      alert([
        `todayInMexico: ${lastDebug.todayInMexico}`,
        `nextKickoffUtc: ${lastDebug.nextKickoffUtc}`,
        `lastKickoffUtc: ${lastDebug.lastKickoffUtc}`,
        `nextIsToday: ${lastDebug.nextIsToday}`,
        `lastIsToday: ${lastDebug.lastIsToday}`,
        `nextAlreadyPassed: ${lastDebug.nextAlreadyPassed}`,
        `lastAlreadyPassed: ${lastDebug.lastAlreadyPassed}`
      ].join("\n"));
    }
   async function loadMatchStatus() {
  setLoading();

  try {
    const [nextResponse, lastResponse] = await Promise.all([
      fetch(NEXT_URL),
      fetch(LAST_URL)
    ]);

    if (!nextResponse.ok) {
      throw new Error(`NEXT HTTP ${nextResponse.status}`);
    }

    if (!lastResponse.ok) {
      throw new Error(`LAST HTTP ${lastResponse.status}`);
    }

    const nextData = await nextResponse.json();
    const lastData = await lastResponse.json();

    const nextEvent = nextData.events && nextData.events.length > 0 ? nextData.events[0] : null;
    const lastEvent = lastData.events && lastData.events.length > 0 ? lastData.events[0] : null;

    const now = new Date();
    const todayInMexico = formatDateInTimeZone(now, MEXICO_TZ);

    const nextKickoffUtc = nextEvent ? buildUtcDateFromEvent(nextEvent) : null;
    const lastKickoffUtc = lastEvent ? buildUtcDateFromEvent(lastEvent) : null;

    const nextIsValid = nextKickoffUtc && !Number.isNaN(nextKickoffUtc.getTime());
    const lastIsValid = lastKickoffUtc && !Number.isNaN(lastKickoffUtc.getTime());

    const nextIsToday = nextIsValid && formatDateInTimeZone(nextKickoffUtc, MEXICO_TZ) === todayInMexico;
    const lastIsToday = lastIsValid && formatDateInTimeZone(lastKickoffUtc, MEXICO_TZ) === todayInMexico;

    const nextAlreadyPassed = nextIsValid && hasLikelyPassed(nextKickoffUtc, now);
    const lastAlreadyPassed = lastIsValid && hasLikelyPassed(lastKickoffUtc, now);

    let tagText = "No hay partido hoy";
    let tagMode = "status-no";
    let showYesImage = false;
    let detailsHtml = `
      <div class="match-line">No se encontró información suficiente</div>
      <div class="time-line">El servicio no devolvió partidos interpretables.</div>
    `;

    // CASO 1: sí juega hoy y todavía no pasa
    if (nextIsToday && !nextAlreadyPassed) {
      tagText = "Hoy juega";
      tagMode = "status-yes";
      showYesImage = true;
      detailsHtml = buildMatchHtml("", nextEvent, nextKickoffUtc, "Partido programado para hoy");
    }

    // CASO 2: ya jugó hoy
    else if (lastIsToday && lastAlreadyPassed) {
      tagText = "Ya jugó hoy";
      tagMode = "status-no";
      showYesImage = false;
      detailsHtml = buildMatchHtml("", lastEvent, lastKickoffUtc, "Ese partido ya pasó hoy");
    }

    // CASO 3: no juega hoy, mostrar próximo real
    else if (nextIsValid) {
      tagText = "No hay partido hoy";
      tagMode = "status-no";
      showYesImage = false;
      detailsHtml = buildMatchHtml("Próximo partido: ", nextEvent, nextKickoffUtc, "El próximo partido no es hoy");
    }

    // CASO 4: si no hay próximo interpretable pero sí último
    else if (lastIsValid) {
      tagText = "Sin próximo disponible";
      tagMode = "status-no";
      showYesImage = false;
      detailsHtml = buildMatchHtml("Último partido: ", lastEvent, lastKickoffUtc, "No se pudo identificar el siguiente partido");
    }

    lastDebug = {
      todayInMexico,
      nextEvent,
      lastEvent,
      nextKickoffUtc: nextIsValid ? nextKickoffUtc.toISOString() : null,
      lastKickoffUtc: lastIsValid ? lastKickoffUtc.toISOString() : null,
      nextIsToday,
      lastIsToday,
      nextAlreadyPassed,
      lastAlreadyPassed
    };

    setStatus(tagText, tagMode, showYesImage, detailsHtml);

    document.getElementById("footer").textContent =
      `Última actualización: ${new Intl.DateTimeFormat("es-MX", {
        timeZone: MEXICO_TZ,
        dateStyle: "medium",
        timeStyle: "short"
      }).format(new Date())}`;

  } catch (error) {
    setError(error.message);
  }
}
  </script>
</body>
</html>
