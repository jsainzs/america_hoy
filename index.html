<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>¿Hoy juega el América?</title>

<style>
:root{
  --text:#f8fafc;
  --muted:rgba(255,255,255,0.9);
  --accent:#facc15;
  --green:#22c55e;
  --red:#ef4444;
  --bg-blue:#0a1f44;
  --bg-blue-2:#16386e;
  --bg-cream:#f3cf18;
  --shadow:0 14px 38px rgba(0,0,0,0.28);
}
*{box-sizing:border-box;}
html,body{margin:0;min-height:100%;}
body{
  font-family:Arial,Helvetica,sans-serif;
  background:
    radial-gradient(circle at 25% 20%, rgba(255,255,255,0.08), transparent 24%),
    radial-gradient(circle at 80% 30%, rgba(255,255,255,0.06), transparent 28%),
    linear-gradient(135deg,var(--bg-blue) 0%,var(--bg-blue-2) 42%,var(--bg-cream) 100%);
  color:var(--text);
  position:relative;
  overflow-x:hidden;
}
.bg-tapestry{
  position:fixed;
  inset:0;
  z-index:0;
  pointer-events:none;
  opacity:.22;
}
.bg-tapestry::before{
  content:"CLUB AMÉRICA AMÉRICA MOISÉS MUÑOZ CUAUHTÉMOC BLANCO CARLOS REINOSO HENRY MARTÍN GUILLERMO OCHOA SALVADOR CABAÑAS IVÁN ZAMORANO";
  white-space:pre-wrap;
  line-height:2;
  letter-spacing:1.5px;
  font-weight:700;
  font-size:clamp(20px,2vw,30px);
  color:rgba(255,255,255,.38);
  display:block;
  width:150%;
  transform:rotate(-14deg) scale(1.16);
  position:absolute;
  top:-10%;
  left:-10%;
}
.shell{
  position:relative;
  z-index:1;
  width:100%;
  max-width:1200px;
  margin:0 auto;
  padding:28px 24px 90px;
}
.title{
  margin:0 0 26px;
  text-align:center;
  font-size:clamp(2.1rem,4vw,3.4rem);
  font-weight:800;
  text-shadow:0 4px 20px rgba(0,0,0,.35);
}
.layout{
  display:grid;
  grid-template-columns:minmax(280px,430px) 1fr;
  gap:34px;
  align-items:center;
}
.media-wrap{display:flex;justify-content:center;}
.hero{
  display:none;
  width:100%;
  max-width:400px;
  max-height:620px;
  object-fit:contain;
  border-radius:18px;
  box-shadow:var(--shadow);
}
.hero.visible{display:block;}
.content{
  display:flex;
  flex-direction:column;
  justify-content:center;
}
.status{
  margin:0 0 16px;
  font-size:clamp(2rem,3vw,3rem);
  font-weight:800;
}
.yes{color:var(--green);}
.no{color:var(--red);}
.details{
  font-size:clamp(1.05rem,1.45vw,1.35rem);
  line-height:1.45;
  color:var(--muted);
  margin-bottom:10px;
}
.meta-line{
  display:inline-block;
  margin-top:10px;
  padding:8px 14px;
  border-radius:999px;
  background:rgba(0,0,0,.18);
  border:1px solid rgba(255,255,255,.12);
  font-size:.95rem;
  color:#fff;
}
.reference-time{
  margin-top:12px;
  font-size:.94rem;
  color:rgba(255,255,255,.8);
}
.box{
  margin-top:18px;
  padding:16px 18px;
  border-radius:18px;
  background:rgba(0,0,0,.16);
  border:1px solid rgba(255,255,255,.12);
  backdrop-filter:blur(6px);
}
.box-title{
  font-size:1rem;
  font-weight:700;
  margin-bottom:14px;
}
.footer-copy{
  margin-top:24px;
  text-align:center;
}
.chanfle-img{
  max-width:220px;
  width:100%;
}
@media(max-width:860px){
  .layout{grid-template-columns:1fr;}
  .content{text-align:center;align-items:center;}
}
</style>
</head>

<body>
<div class="bg-tapestry"></div>

<main class="shell">
<h1 class="title">¿Hoy juega el América?</h1>

<div class="layout">

<div class="media-wrap">
  <img id="imgSi" class="hero" src="hoy_juega_america.png">
  <img id="imgNo" class="hero" src="no_juega_america.png">
  <img id="imgCruzAzulProx" class="hero" src="CAZ_prox_2026.jpeg">
  <img id="imgCruzAzulHoy" class="hero" src="CAZ_hoy_2026.jpeg">
  <img id="imgNashvilleCoco" class="hero" src="nashville_coco.png">
</div>

<div class="content">
  <div id="status" class="status">Consultando...</div>
  <div id="details" class="details"></div>

  <div id="funFact"></div>

  <div style="margin-top:18px;">
    <a href="trivia.html" class="meta-line" style="text-decoration:none;font-weight:700;">
      Jugar trivia americanista
    </a>
  </div>

  <div class="footer-copy">
    <img src="chanfle.png" class="chanfle-img">
  </div>
</div>

</div>
</main>

<script>
const TEAM_ID="134193";
const API_URL=`https://www.thesportsdb.com/api/v1/json/123/eventsnext.php?id=${TEAM_ID}`;
const TZ="America/Mexico_City";

function normalizeTeamName(name){
  return (name||"")
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g,"")
    .toLowerCase()
    .replace(/\./g,"")
    .replace(/\s+/g," ")
    .trim();
}

function isVsCruzAzul(event){
  const h=normalizeTeamName(event.strHomeTeam);
  const a=normalizeTeamName(event.strAwayTeam);
  return h.includes("cruz azul")||a.includes("cruz azul");
}

function isVsNashville(event){
  const h=normalizeTeamName(event.strHomeTeam);
  const a=normalizeTeamName(event.strAwayTeam);
  return h.includes("nashville")||a.includes("nashville");
}

function isAmericaName(name){
  return normalizeTeamName(name).includes("america");
}

function getOpponentName(event){
  if(isAmericaName(event.strHomeTeam)) return event.strAwayTeam;
  if(isAmericaName(event.strAwayTeam)) return event.strHomeTeam;
  return event.strAwayTeam;
}

function hideAllImages(){
  ["imgSi","imgNo","imgCruzAzulProx","imgCruzAzulHoy","imgNashvilleCoco"]
    .forEach(id=>document.getElementById(id).classList.remove("visible"));
}

function showImage(mode){
  hideAllImages();

  const map={
    "general-yes":"imgSi",
    "general-no":"imgNo",
    "caz-prox":"imgCruzAzulProx",
    "caz-hoy":"imgCruzAzulHoy",
    "nashville-coco":"imgNashvilleCoco"
  };

  if(map[mode]) document.getElementById(map[mode]).classList.add("visible");
}

function getMexicoDate(date){
  return new Intl.DateTimeFormat("en-CA",{
    timeZone:TZ,
    year:"numeric",
    month:"2-digit",
    day:"2-digit"
  }).format(date);
}

function formatMexicoDateTime(date){
  return new Intl.DateTimeFormat("es-MX",{
    timeZone:TZ,
    weekday:"long",
    day:"numeric",
    month:"long",
    hour:"2-digit",
    minute:"2-digit"
  }).format(date);
}

function parseDate(event){
  let raw=event.strTimestamp||`${event.dateEvent}T${event.strTime}`;
  if(!raw.endsWith("Z")) raw+="Z";
  return new Date(raw);
}

function setReferenceTime(text){
  document.getElementById("details").innerHTML +=
    `<div class="reference-time">Hora de referencia: ${text}</div>`;
}

function renderFunFact(event){
  const box=document.getElementById("funFact");
  box.innerHTML="";

  if(isVsCruzAzul(event)){
    box.innerHTML=`
      <div class="box">
        <div class="box-title">Expediente íntimo del americanismo</div>
        Por ahí de 1988 fuimos a un América-Cruz Azul, un partido de liga. Llegamos como hora y media antes del partido,
        en zona baja detrás de una portería del Azteca. Pablo Larios calentaba. Íbamos mi primo Marco,
        su papá Jorge y yo. Jorge anunció: “Van a ver que me conoce”, y empezó a gritar muy insistente:
        “¡Pablo, Pablo!”. Al fin, Larios volteó apenas, saludó con desgano y de reojo.
        Jorge aceleró para buscar lugar y dictó: “Ya no le vuelvo a prestar dinero”.
      </div>`;
    return;
  }

  if(isVsNashville(event)){
    box.innerHTML=`
      <div class="box">
        <div class="box-title">Expediente íntimo del americanismo</div>
        Corría el año 2023, estaba entrada la noche y el América disputaba con los griguillos del Nashville
        los playoffs de la Concachampions. Fue un partido trabado que al final ganó el América en penales,
        con una buena parada de Malagón. Me fui a dormir satisfecho y alegre. Al día siguiente me bañé
        y me fui peinado al trabajo. Un amigo necaxista me sorprendió con un “¿qué tal la Concachampions?”.
        Me sorprendió que quisiera hablar del tema, pero aproveché y presumí el poder del ave.
        Después de un rato, mis colegas del trabajo me dijeron:
        “¿Apagaste la tele después del penal que detuvo Malagón?” y se empezaron a reír.
        Después de que los jugadores se fueron a los vestidores, el arbitrario árbitro ordenó repetir el penal,
        y Nashville acabó ganando. A veces nos toca perder, sentir lo que sienten los aficionados de los demás equipos.
      </div>`;
  }
}

async function loadMatch(){
  try{
    const matchRes=await fetch(API_URL);
    const data=await matchRes.json();

    const event=data.events[0];
    const date=parseDate(event);

    const today=getMexicoDate(new Date());
    const eventDate=getMexicoDate(date);

    const finished=(event.strStatus||"").includes("Finished");
    const cruzAzul=isVsCruzAzul(event);
    const nashville=isVsNashville(event);

    const matchText=`${event.strHomeTeam} vs ${event.strAwayTeam}`;
    const dateText=formatMexicoDateTime(date);

    const status=document.getElementById("status");
    const details=document.getElementById("details");

    if(eventDate>today){
      status.textContent="No juega hoy";
      status.className="status no";

      if(cruzAzul) showImage("caz-prox");
      else showImage("general-no");

      details.innerHTML=`
        <div><b>Próximo partido</b></div>
        <div class="meta-line">${matchText}</div>
      `;

    }else if(eventDate===today){

      if(finished){
        status.textContent=nashville?"Todavía duele":"Ya jugó hoy";
        status.className="status no";

        if(nashville) showImage("nashville-coco");
        else showImage("general-no");

      }else{
        status.textContent="Hoy juega";
        status.className="status yes";

        if(cruzAzul) showImage("caz-hoy");
        else showImage("general-yes");
      }

      details.innerHTML=`<div><b>${matchText}</b></div>`;

    }else{
      status.textContent=nashville?"Todavía duele":"No juega hoy";
      status.className="status no";

      if(nashville) showImage("nashville-coco");
      else showImage("general-no");

      details.innerHTML=`
        <div><b>Último partido registrado</b></div>
        <div class="meta-line">${matchText}</div>
      `;
    }

    setReferenceTime(dateText);
    renderFunFact(event);

  }catch(err){
    console.error(err);
    document.getElementById("status").textContent="Error al cargar";
    document.getElementById("status").className="status no";
    showImage("general-no");
  }
}

loadMatch();
</script>

</body>
</html>
