<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>¿Hoy juega el América?</title>
  <style>
    :root {
      --bg: #08111f;
      --bg-2: #132238;
      --card: rgba(10, 18, 32, 0.88);
      --card-border: rgba(255,255,255,0.08);
      --text: #f8fafc;
      --muted: #cbd5e1;
      --muted-2: #94a3b8;
      --accent: #facc15;
      --accent-soft: rgba(250, 204, 21, 0.14);
      --blue-soft: rgba(29, 78, 216, 0.16);
      --green-soft: rgba(22, 163, 74, 0.16);
      --red-soft: rgba(220, 38, 38, 0.16);
      --green-text: #bbf7d0;
      --red-text: #fecaca;
      --blue-text: #bfdbfe;
      --shadow: 0 24px 60px rgba(0,0,0,0.42);
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      height: 100%;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top, rgba(250, 204, 21, 0.08), transparent 28%),
        linear-gradient(135deg, var(--bg), var(--bg-2));
      overflow: hidden;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 12px;
    }

    .card {
      width: min(760px, 100%);
      max-height: calc(100vh - 24px);
      background: var(--card);
      border: 1px solid var(--card-border);
      border-radius: 24px;
      padding: 16px 16px 14px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(8px);
      text-align: center;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      gap: 10px;
      overflow: hidden;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 7px 12px;
      border-radius: 999px;
      background: var(--accent-soft);
      color: var(--accent);
      font-weight: 700;
      letter-spacing: 0.3px;
      font-size: 0.9rem;
    }

    .status-tag {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 34px;
      padding: 7px 12px;
      border-radius: 999px;
      font-size: 0.78rem;
      font-weight: 800;
      letter-spacing: 0.8px;
      text-transform: uppercase;
    }

    .status-loading {
      background: var(--blue-soft);
      color: var(--blue-text);
      border: 1px solid rgba(29, 78, 216, 0.3);
    }

    .status-yes {
      background: var(--green-soft);
      color: var(--green-text);
      border: 1px solid rgba(22, 163, 74, 0.34);
    }

    .status-no {
      background: var(--red-soft);
      color: var(--red-text);
      border: 1px solid rgba(220, 38, 38, 0.34);
    }

    h1 {
      margin: 0;
      font-size: clamp(1.7rem, 4vw, 2.6rem);
      line-height: 1.05;
      letter-spacing: -0.02em;
    }

    .subtitle {
      margin: 0;
      color: var(--muted);
      font-size: 0.98rem;
      line-height: 1.35;
    }

    .hero-wrap {
      width: 100%;
      flex: 1 1 auto;
      min-height: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .hero {
      width: 100%;
      max-height: 100%;
      object-fit: contain;
      display: none;
      border-radius: 20px;
      box-shadow: 0 14px 34px rgba(0,0,0,0.33);
    }

    .hero.visible {
      display: block;
      animation: fadeIn 0.35s ease;
    }

    .details {
      padding: 12px 14px;
      border-radius: 18px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.05);
      color: var(--muted);
      font-size: 0.96rem;
      line-height: 1.45;
      min-height: 84px;
    }

    .details .match-line {
      color: white;
      font-size: 1.08rem;
      font-weight: 800;
      margin-bottom: 6px;
      line-height: 1.3;
    }

    .details .comp-line {
      color: #e2e8f0;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .details .time-line {
      color: var(--muted);
    }

    .details .label {
      display: inline-block;
      margin-top: 8px;
      font-size: 0.82rem;
      color: var(--muted-2);
      letter-spacing: 0.2px;
    }

    .controls {
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
    }

    button {
      border: none;
      border-radius: 12px;
      padding: 11px 16px;
      font-size: 0.94rem;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.15s ease, filter 0.15s ease;
    }

    button:hover {
      transform: translateY(-1px);
      filter: brightness(1.04);
    }

    button:active {
      transform: translateY(0);
    }

    .primary {
      background: var(--accent);
      color: #111827;
    }

    .secondary {
      background: #1d4ed8;
      color: white;
    }

    .footer {
      font-size: 0.84rem;
      color: var(--muted-2);
      line-height: 1.35;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(6px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 640px) {
      body {
        padding: 8px;
      }

      .card {
        max-height: calc(100vh - 16px);
        border-radius: 18px;
        padding: 12px 12px 10px;
        gap: 8px;
      }

      .topbar {
        justify-content: center;
      }

      h1 {
        font-size: clamp(1.45rem, 6vw, 2rem);
      }

      .subtitle {
        font-size: 0.9rem;
      }

      .details {
        font-size: 0.9rem;
        min-height: 74px;
        padding: 10px 12px;
      }

      .details .match-line {
        font-size: 1rem;
      }

      .controls {
        gap: 8px;
      }

      button {
        flex: 1 1 0;
        min-width: 140px;
        padding: 10px 12px;
        font-size: 0.9rem;
      }

      .footer {
        font-size: 0.78rem;
      }
    }

    @media (max-height: 740px) {
      .card {
        gap: 7px;
        padding-top: 12px;
        padding-bottom: 10px;
      }

      h1 {
        font-size: clamp(1.45rem, 3vw, 2rem);
      }

      .subtitle {
        font-size: 0.88rem;
      }

      .details {
        min-height: 68px;
        font-size: 0.88rem;
        padding: 9px 11px;
      }

      .details .match-line {
        font-size: 0.98rem;
      }

      .footer {
        font-size: 0.76rem;
      }

      button {
        padding: 9px 12px;
        font-size: 0.88rem;
      }
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="topbar">
      <div class="badge">Club América</div>
      <div id="statusTag" class="status-tag status-loading">Consultando</div>
    </div>

    <h1>¿Hoy juega el América?</h1>
    <p class="subtitle">Información automática del próximo partido en hora de CDMX.</p>

    <div class="hero-wrap">
      <img
        id="imgSi"
        class="hero"
        src="hoy_juega_america.png"
        alt="Hoy juega el América"
      >
      <img
        id="imgNo"
        class="hero"
        src="no_juega_america.png"
        alt="Hoy no juega el América"
      >
    </div>

    <div id="details" class="details">
      Cargando información del próximo partido...
    </div>

    <div class="controls">
      <button class="primary" onclick="loadMatchStatus()">Actualizar</button>
      <button class="secondary" onclick="showDebugInfo()">Ver diagnóstico</button>
    </div>

    <div class="footer" id="footer">
      Fuente: próximo partido del Club América y conversión a hora de CDMX.
    </div>
  </main>

  <script>
    const TEAM_ID = "134193";
    const API_URL = `https://www.thesportsdb.com/api/v1/json/123/eventsnext.php?id=${TEAM_ID}`;
    const MEXICO_TZ = "America/Mexico_City";

    let lastDebug = null;

    function formatDateInTimeZone(date, timeZone) {
      return new Intl.DateTimeFormat("en-CA", {
        timeZone,
        year: "numeric",
        month: "2-digit",
        day: "2-digit"
      }).format(date);
    }

    function formatTimeInTimeZone(date, timeZone) {
      return new Intl.DateTimeFormat("es-MX", {
        timeZone,
        hour: "2-digit",
        minute: "2-digit",
        hour12: false
      }).format(date);
    }

    function formatLongDateTimeInMexico(date) {
      return new Intl.DateTimeFormat("es-MX", {
        timeZone: MEXICO_TZ,
        weekday: "long",
        day: "numeric",
        month: "long",
        hour: "2-digit",
        minute: "2-digit",
        hour12: false
      }).format(date);
    }

    function showOnlyImage(showYes) {
      const imgSi = document.getElementById("imgSi");
      const imgNo = document.getElementById("imgNo");

      imgSi.classList.remove("visible");
      imgNo.classList.remove("visible");

      if (showYes) {
        imgSi.classList.add("visible");
      } else {
        imgNo.classList.add("visible");
      }
    }

    function setTag(text, mode) {
      const tag = document.getElementById("statusTag");
      tag.textContent = text;
      tag.className = `status-tag ${mode}`;
    }

    function setLoading(message = "Consultando información del partido...") {
      const details = document.getElementById("details");

      setTag("Consultando", "status-loading");
      details.innerHTML = message;
      document.getElementById("imgSi").classList.remove("visible");
      document.getElementById("imgNo").classList.remove("visible");
    }

    function setStatus(playsToday, detailsHtml) {
      const details = document.getElementById("details");

      if (playsToday) {
        setTag("Hoy juega", "status-yes");
        showOnlyImage(true);
      } else {
        setTag("No hay partido hoy", "status-no");
        showOnlyImage(false);
      }

      details.innerHTML = detailsHtml || "";
    }

    function setError(message) {
      const details = document.getElementById("details");

      setTag("No se pudo consultar", "status-no");
      details.innerHTML = `
        <div class="match-line">No se pudo cargar la información</div>
        <div class="time-line">${message}</div>
      `;
      document.getElementById("imgSi").classList.remove("visible");
      document.getElementById("imgNo").classList.remove("visible");
    }

    function buildUtcDateFromEvent(event) {
      if (!event.dateEvent || !event.strTime) {
        return null;
      }
      return new Date(`${event.dateEvent}T${event.strTime}Z`);
    }

    async function loadMatchStatus() {
      setLoading();

      try {
        const response = await fetch(API_URL);

        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }

        const data = await response.json();

        if (!data.events || data.events.length === 0) {
          setStatus(
            false,
            `
              <div class="match-line">No se encontró un próximo partido</div>
              <div class="time-line">La respuesta del servicio llegó vacía.</div>
            `
          );
          return;
        }

        const event = data.events[0];
        const kickoffUtc = buildUtcDateFromEvent(event);

        if (!kickoffUtc || Number.isNaN(kickoffUtc.getTime())) {
          throw new Error("La fecha u hora del partido no se pudo interpretar.");
        }

        const todayInMexico = formatDateInTimeZone(new Date(), MEXICO_TZ);
        const matchDateInMexico = formatDateInTimeZone(kickoffUtc, MEXICO_TZ);
        const matchTimeInMexico = formatTimeInTimeZone(kickoffUtc, MEXICO_TZ);
        const playsToday = todayInMexico === matchDateInMexico;

        const home = event.strHomeTeam || "Equipo local";
        const away = event.strAwayTeam || "Equipo visitante";
        const league = event.strLeague || "Competencia no especificada";
        const longDate = formatLongDateTimeInMexico(kickoffUtc);

        const detailsHtml = playsToday
          ? `
              <div class="match-line">${home} vs ${away}</div>
              <div class="comp-line">${league}</div>
              <div class="time-line">${longDate} (hora de CDMX)</div>
              <div class="label">Partido programado para hoy</div>
            `
          : `
              <div class="match-line">Próximo partido: ${home} vs ${away}</div>
              <div class="comp-line">${league}</div>
              <div class="time-line">${longDate} (hora de CDMX)</div>
              <div class="label">Hoy no hay partido del América</div>
            `;

        lastDebug = {
          rawEvent: event,
          todayInMexico,
          matchDateInMexico,
          matchTimeInMexico,
          kickoffUtc: kickoffUtc.toISOString(),
          playsToday
        };

        setStatus(playsToday, detailsHtml);

        document.getElementById("footer").textContent =
          `Última actualización: ${new Intl.DateTimeFormat("es-MX", {
            timeZone: MEXICO_TZ,
            dateStyle: "medium",
            timeStyle: "short"
          }).format(new Date())}`;
      } catch (error) {
        setError(error.message);
      }
    }

    function showDebugInfo() {
      if (!lastDebug) {
        alert("Aún no hay datos cargados.");
        return;
      }

      alert(
        [
          `todayInMexico: ${lastDebug.todayInMexico}`,
          `matchDateInMexico: ${lastDebug.matchDateInMexico}`,
          `matchTimeInMexico: ${lastDebug.matchTimeInMexico}`,
          `kickoffUtc: ${lastDebug.kickoffUtc}`,
          `playsToday: ${lastDebug.playsToday}`
        ].join("\n")
      );
    }

    loadMatchStatus();
  </script>
</body>
</html>
