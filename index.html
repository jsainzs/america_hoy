<script>
const TEAM_ID   = "134193";
const API_URL   = `https://www.thesportsdb.com/api/v1/json/123/eventsnext.php?id=${TEAM_ID}`;
const MARKET_VALUES_URL = "./market_values.json";
const STANDINGS_URL     = "./standings.json";
const TZ = "America/Mexico_City";

const FORCE_NASHVILLE_COCO_WHEN_NO_NEXT_MATCH = true;
const LAST_SPECIAL_MATCH_LABEL = "América vs Nashville SC";

// ─────────────────────────────────────────────
// CANALES POR TORNEO (México)
// ─────────────────────────────────────────────
const BROADCAST_BY_LEAGUE = {
  "Liga MX":                   "Canal 5 · TUDN · VIX Premium · Layvtime (YouTube)",
  "Liga BBVA MX":              "Canal 5 · TUDN · VIX Premium · Layvtime (YouTube)",
  "Apertura":                  "Canal 5 · TUDN · VIX Premium",
  "Clausura":                  "Canal 5 · TUDN · VIX Premium",
  "CONCACAF Champions Cup":    "Fox Sports · VIX",
  "CONCACAF Champions League": "Fox Sports · VIX",
  "Copa MX":                   "VIX",
  "FIFA Club World Cup":       "DAZN · Azteca 7",
  "Leagues Cup":               "Apple TV+",
  "Mexican Primera League":    "Canal 5 · TUDN · VIX Premium · Layvtime (YouTube)",
  "Friendly":                  "VIX (confirmar)",
};
const BROADCAST_FALLBACK = "VIX (confirmar canal)";

// ─────────────────────────────────────────────
// LIGAS QUE CUENTAN COMO LIGA MX
// ─────────────────────────────────────────────
const LIGA_MX_KEYWORDS = [
  "liga mx", "liga bbva mx", "apertura", "clausura",
  "liga mx apertura", "liga mx clausura",
  "mexican primera league"
];

const MARKET_VALUE_TEAM_ALIASES = {
  "america":"club-america","cf america":"club-america",
  "club america":"club-america","america mexico":"club-america",
  "cruz azul":"cruz-azul","toluca":"toluca",
  "tigres":"tigres","tigres uanl":"tigres",
  "monterrey":"monterrey","rayados":"monterrey",
  "guadalajara":"guadalajara","club guadalajara":"guadalajara","chivas":"guadalajara",
  "pachuca":"pachuca","pumas":"pumas","pumas unam":"pumas","unam":"pumas",
  "tijuana":"tijuana","xolos":"tijuana","club tijuana":"tijuana",
  "leon":"leon","club leon":"leon","necaxa":"necaxa",
  "juarez":"juarez","fc juarez":"juarez","bravos":"juarez",
  "atletico san luis":"san-luis","san luis":"san-luis",
  "santos laguna":"santos","santos":"santos","atlas":"atlas",
  "queretaro":"queretaro","queretaro fc":"queretaro","gallos blancos":"queretaro",
  "puebla":"puebla","mazatlan":"mazatlan","mazatlan fc":"mazatlan",
  "inter miami":"inter-miami","inter miami cf":"inter-miami",
  "nashville":"nashville-sc","nashville sc":"nashville-sc",
  "lafc":"lafc","los angeles fc":"lafc",
  "la galaxy":"la-galaxy","atlanta united":"atlanta-united",
  "seattle sounders":"seattle","seattle sounders fc":"seattle"
};

// ─────────────────────────────────────────────
// UTILIDADES
// ─────────────────────────────────────────────
function normalizeTeamName(name){
  return (name||"")
    .normalize("NFD").replace(/[\u0300-\u036f]/g,"")
    .toLowerCase().replace(/\./g,"").replace(/\s+/g," ").trim();
}
function isVsCruzAzul(event){
  const h=normalizeTeamName(event.strHomeTeam);
  const a=normalizeTeamName(event.strAwayTeam);
  return h.includes("cruz azul")||a.includes("cruz azul");
}
function isVsToluca(event){
  const h = normalizeTeamName(event.strHomeTeam);
  const a = normalizeTeamName(event.strAwayTeam);
  return h.includes("toluca") || a.includes("toluca");
}
function isVsNashville(event){
  const h=normalizeTeamName(event.strHomeTeam);
  const a=normalizeTeamName(event.strAwayTeam);
  return h.includes("nashville")||a.includes("nashville");
}
function isAmericaName(name){
  const n=normalizeTeamName(name);
  return n==="america"||n==="cf america"||n==="club america"||n.includes("america");
}
function getOpponentName(event){
  if(isAmericaName(event.strHomeTeam)) return event.strAwayTeam;
  if(isAmericaName(event.strAwayTeam)) return event.strHomeTeam;
  return event.strAwayTeam;
}
function getMarketTeamId(rawName){
  const n=normalizeTeamName(rawName);
  if(MARKET_VALUE_TEAM_ALIASES[n]) return MARKET_VALUE_TEAM_ALIASES[n];
  for(const key of Object.keys(MARKET_VALUE_TEAM_ALIASES)){
    if(n.includes(key)||key.includes(n)) return MARKET_VALUE_TEAM_ALIASES[key];
  }
  return null;
}
function isLigaMX(event){
  const league=(event.strLeague||"").toLowerCase().trim();
  return LIGA_MX_KEYWORDS.some(l=>league.includes(l));
}
function getMexicoDate(date){
  return new Intl.DateTimeFormat("en-CA",{
    timeZone:TZ,year:"numeric",month:"2-digit",day:"2-digit"
  }).format(date);
}
function formatMexicoDateTime(date){
  return new Intl.DateTimeFormat("es-MX",{
    timeZone:TZ,weekday:"long",day:"numeric",month:"long",
    hour:"2-digit",minute:"2-digit"
  }).format(date);
}
function parseDate(event){
  let raw=event.strTimestamp||`${event.dateEvent}T${event.strTime}`;
  if(!raw) return null;
  if(!raw.endsWith("Z")) raw+="Z";
  const d=new Date(raw);
  return isNaN(d)?null:d;
}
function formatEurCompact(value){
  return new Intl.NumberFormat("es-MX",{
    style:"currency",currency:"EUR",
    notation:"compact",compactDisplay:"short",maximumFractionDigits:1
  }).format(value);
}

// ─────────────────────────────────────────────
// IMÁGENES
// ─────────────────────────────────────────────
function hideAllImages(){
  [
    "imgSi",
    "imgNo",
    "imgCruzAzulProx",
    "imgCruzAzulHoy",
    "imgNashvilleCoco",
    "imgAmeTolucaSraAnti"
  ].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.classList.remove("visible");
  });
}

function showImage(mode){
  hideAllImages();
  const map = {
    "general-yes": "imgSi",
    "general-no": "imgNo",
    "caz-prox": "imgCruzAzulProx",
    "caz-hoy": "imgCruzAzulHoy",
    "nashville-coco": "imgNashvilleCoco",
    "toluca-hoy": "imgAmeTolucaSraAnti"
  };
  if (map[mode]) {
    const el = document.getElementById(map[mode]);
    if (el) el.classList.add("visible");
  }
}

// ─────────────────────────────────────────────
// HORA DE REFERENCIA
// ─────────────────────────────────────────────
function setReferenceTime(dateText){
  document.getElementById("details").innerHTML +=
    `<div class="reference-time">Hora de referencia: ${dateText} (Ciudad de México)</div>`;
}

// ─────────────────────────────────────────────
// DÓNDE VER EL PARTIDO
// ─────────────────────────────────────────────
function renderBroadcastInfo(event){
  const box=document.getElementById("broadcastInfo");
  box.innerHTML="";
  const apiChannel=(event.strTVStation||"").trim();
  const league=(event.strLeague||"").trim();
  const tableChannel=BROADCAST_BY_LEAGUE[league]||null;
  const channels=apiChannel||tableChannel||BROADCAST_FALLBACK;
  box.innerHTML=`
    <div class="broadcast-box">
      <span class="tv-icon">📺</span>
      <span class="tv-label">Dónde verlo:</span>
      <span class="tv-channels">${channels}</span>
    </div>`;
}

// ─────────────────────────────────────────────
// TABLA DE POSICIONES
// ─────────────────────────────────────────────
async function loadStandings(){
  const res=await fetch(STANDINGS_URL);
  if(!res.ok) throw new Error("No se pudo cargar standings.json");
  return res.json();
}

function renderStandings(event,standingsData){
  const box=document.getElementById("standingsInfo");
  box.innerHTML="";
  if(!standingsData||!Array.isArray(standingsData.standings)) return;
  if(!isLigaMX(event)) return;

  const table=standingsData.standings;
  const rivalRaw=getOpponentName(event);
  const rivalId=getMarketTeamId(rivalRaw);

  const americaIdx=table.findIndex(t=>t.team_id==="club-america");
  const rivalIdx=table.findIndex(t=>
    t.team_id===rivalId||
    normalizeTeamName(t.team)===normalizeTeamName(rivalRaw)
  );
  if(americaIdx===-1||rivalIdx===-1) return;

  const WINDOW=2;
  const len=table.length;
  function range(idx){
    return{from:Math.max(0,idx-WINDOW),to:Math.min(len-1,idx+WINDOW)};
  }
  const rA=range(americaIdx);
  const rR=range(rivalIdx);
  const indices=new Set();
  for(let i=rA.from;i<=rA.to;i++) indices.add(i);
  for(let i=rR.from;i<=rR.to;i++) indices.add(i);
  const sorted=[...indices].sort((a,b)=>a-b);

  let rows="";
  let prev=null;
  for(const i of sorted){
    if(prev!==null&&i>prev+1){
      rows+=`<tr class="standings-gap"><td colspan="3">· · ·</td></tr>`;
    }
    const t=table[i];
    const isAmerica=i===americaIdx;
    const isRival=i===rivalIdx;
    const cls=isAmerica?"highlight-america":isRival?"highlight-rival":"";
    const label=isAmerica?" 🦅":isRival?" ⚽":"";
    rows+=`
      <tr class="${cls}">
        <td class="num pos-badge">${t.position}</td>
        <td>${t.team}${label}</td>
        <td class="num">${t.points} pts</td>
      </tr>`;
    prev=i;
  }

  box.innerHTML=`
    <div class="standings-box">
      <div class="standings-heading">
        Tabla de posiciones
        <span class="standings-season">${standingsData.season||""}</span>
      </div>
      <table class="standings-table">
        <thead>
          <tr>
            <th class="num">#</th>
            <th>Equipo</th>
            <th class="num">Pts</th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>
      <div class="standings-meta">Actualizado: ${standingsData.updated_at||"sin fecha"}</div>
    </div>`;
}

// ─────────────────────────────────────────────
// BILLETÓMETRO (TRANSFERMARKT)
// ─────────────────────────────────────────────
async function loadMarketValues(){
  const res=await fetch(MARKET_VALUES_URL);
  if(!res.ok) throw new Error("No se pudo cargar market_values.json");
  return res.json();
}
function buildMarketVerdict(america,rival){
  if(!america||!rival) return "";
  const ratio=america.squad_value_eur/rival.squad_value_eur;
  const ratioText=ratio>=1?`${ratio.toFixed(2)}x`:`${(1/ratio).toFixed(2)}x`;
  if(america.squad_value_eur>rival.squad_value_eur)
    return `América vale <strong>${ratioText}</strong> lo que ${rival.team_name}.`;
  if(america.squad_value_eur<rival.squad_value_eur)
    return `${rival.team_name} vale <strong>${ratioText}</strong> lo que América.`;
  return `América y ${rival.team_name} llegan con el mismo valor de plantilla.`;
}
function renderMarketValueInfo(event,marketData){
  const box=document.getElementById("marketValueInfo");
  box.innerHTML="";
  if(!marketData||!Array.isArray(marketData.teams)) return;

  const rivalRaw=getOpponentName(event);
  const rivalId=getMarketTeamId(rivalRaw);
  const america=marketData.teams.find(t=>t.team_id==="club-america");
  let rival=marketData.teams.find(t=>t.team_id===rivalId);
  if(!rival){
    const nr=normalizeTeamName(rivalRaw);
    rival=marketData.teams.find(t=>{
      const nt=normalizeTeamName(t.team_name);
      return nt===nr||nt.includes(nr)||nr.includes(nt);
    });
  }
  if(!america||!rival) return;

  const maxValue=Math.max(america.squad_value_eur,rival.squad_value_eur);
  const americaWidth=(america.squad_value_eur/maxValue)*100;
  const rivalWidth=(rival.squad_value_eur/maxValue)*100;
  const verdict=buildMarketVerdict(america,rival);

  box.innerHTML=`
    <div class="market-box">
      <div class="market-heading">Billetómetro (Transfermarkt)</div>
      <div class="market-row">
        <div class="market-label">
          <span>América</span><strong>${formatEurCompact(america.squad_value_eur)}</strong>
        </div>
        <div class="market-track">
          <div class="market-fill-america" style="width:${americaWidth}%"></div>
        </div>
      </div>
      <div class="market-row">
        <div class="market-label">
          <span>${rival.team_name}</span><strong>${formatEurCompact(rival.squad_value_eur)}</strong>
        </div>
        <div class="market-track">
          <div class="market-fill-rival" style="width:${rivalWidth}%"></div>
        </div>
      </div>
      <div class="market-verdict">${verdict}</div>
      <div class="market-meta">
        Ranking en su liga: América #${america.rank_in_league} · ${rival.team_name} #${rival.rank_in_league}<br>
        Corte de datos: ${marketData.updated_at||"sin fecha"} · Fuente: ${marketData.source||"Transfermarkt"}
      </div>
    </div>`;
}

// ─────────────────────────────────────────────
// ANÉCDOTAS
// ─────────────────────────────────────────────
function renderFunFact(event){
  const box=document.getElementById("funFact");
  box.innerHTML="";
  if(isVsCruzAzul(event)){
    box.innerHTML=`
      <div class="confidential-box">
        <div class="confidential-title">Expediente íntimo del americanismo</div>
        <div class="confidential-text">
          Por ahí de 1988 fuimos a un América-Cruz Azul, un partido de liga. Llegamos como hora y media antes del partido,
          en zona baja detrás de una portería del Azteca. Pablo Larios calentaba. Íbamos mi primo Marco,
          su papá Jorge y yo. Jorge anunció: "Van a ver que me conoce", y empezó a gritar muy insistente:
          "¡Pablo, Pablo!". Al fin, Larios volteó apenas, saludó con desgano y de reojo.
          Jorge aceleró para buscar lugar y dictó: "Ya no le vuelvo a prestar dinero".
        </div>
      </div>`;
    return;
  }
  if(isVsNashville(event)){
    box.innerHTML=`
      <div class="confidential-box">
        <div class="confidential-title">Expediente íntimo del americanismo</div>
        <div class="confidential-text">
          Corría el año 2023, estaba entrada la noche y el América disputaba con los griguillos del Nashville
          los playoffs de la Concachampions. Fue un partido trabado que al final ganó el América en penales,
          con una buena parada de Malagón. Me fui a dormir satisfecho y alegre. Al día siguiente me bañé
          y me fui peinado al trabajo. Un amigo necaxista me sorprendió con un "¿qué tal la Concachampions?".
          Me sorprendió que quisiera hablar del tema, pero aproveché y presumí el poder del ave. Después de un rato,
          mis colegas del trabajo me dijeron: "¿Apagaste la tele después del penal que detuvo Malagón?" y se empezaron a reír.
          Después de que los jugadores se fueron a los vestidores, el arbitrario árbitro ordenó repetir el penal,
          y Nashville acabó ganando. A veces nos toca perder, sentir lo que sienten los aficionados de los demás equipos.
        </div>
      </div>`;
  }
}

document.addEventListener("DOMContentLoaded", async function() {
  const el = document.getElementById("visits");
  if (!el) return;

  try {
    const namespace = "jsainzs";
    const key = "america_hoy";

    await fetch(`https://api.countapi.xyz/create?namespace=${namespace}&key=${key}&value=0`);

    const res = await fetch(`https://api.countapi.xyz/hit/${namespace}/${key}`);
    const data = await res.json();

    el.textContent = (typeof data.value !== "undefined") ? data.value : "—";
  } catch (err) {

    el.textContent = "—";

});
// ─────────────────────────────────────────────
// FUNCIÓN PRINCIPAL
// ─────────────────────────────────────────────
async function loadMatch(){
  const status        = document.getElementById("status");
  const details       = document.getElementById("details");
  const broadcastInfo = document.getElementById("broadcastInfo");
  const standingsInfo = document.getElementById("standingsInfo");
  const marketValueInfo=document.getElementById("marketValueInfo");
  const funFact       = document.getElementById("funFact");

  status.textContent="Consultando...";
  status.className="status";
  details.innerHTML="";
  broadcastInfo.innerHTML="";
  standingsInfo.innerHTML="";
  marketValueInfo.innerHTML="";
  funFact.innerHTML="";
  hideAllImages();

  try{
    const [matchRes, marketData, standingsData]=await Promise.all([
      fetch(API_URL),
      loadMarketValues().catch(()=>null),
      loadStandings().catch(()=>null)
    ]);

    const data=await matchRes.json();
    console.log("Respuesta API:", JSON.stringify(data));
    if(!data.events||data.events.length===0){
      status.textContent=FORCE_NASHVILLE_COCO_WHEN_NO_NEXT_MATCH?"Todavía duele":"Sin datos";
      status.className="status no";
      if(FORCE_NASHVILLE_COCO_WHEN_NO_NEXT_MATCH){
        showImage("nashville-coco");
        details.innerHTML=`
          <div><b>Último partido registrado</b></div>
          <div class="meta-line">${LAST_SPECIAL_MATCH_LABEL}</div>
          <div class="reference-time">En lo que aparece el próximo partido, sigue vigente la herida de Nashville.</div>`;
      } else {
        showImage("general-no");
        details.innerHTML=`No se encontró información del próximo partido.`;
      }
      return;
    }

    const event=data.events[0];
    console.log("Liga:", event.strLeague, "| Rival:", event.strHomeTeam, "vs", event.strAwayTeam);    
    const date=parseDate(event);

    if(!date){
      status.textContent="Error en fecha";
      status.className="status no";
      showImage("general-no");
      details.innerHTML=`No fue posible interpretar la fecha del partido.`;
      return;
    }

    const today     =getMexicoDate(new Date());
    const eventDate =getMexicoDate(date);
    const finished  =(event.strStatus||"").includes("Finished");
    const cruzAzulMatch=isVsCruzAzul(event);
    const nashvilleMatch=isVsNashville(event);
    const tolucaMatch=isVsToluca(event);
    const matchText =`${event.strHomeTeam} vs ${event.strAwayTeam}`;
    const dateText  =formatMexicoDateTime(date);

    if(eventDate>today){
      status.textContent="No juega hoy";
      status.className="status no";
      showImage(cruzAzulMatch?"caz-prox":"general-no");
      details.innerHTML=`
        <div><b>Próximo partido</b></div>
        <div class="meta-line">${matchText}</div>`;
      setReferenceTime(dateText);
      renderBroadcastInfo(event);
      renderStandings(event,standingsData);
      renderMarketValueInfo(event,marketData);
      renderFunFact(event);

    } else if(eventDate===today){
      if(finished){
        status.textContent=nashvilleMatch?"Todavía duele":"Ya jugó hoy";
        status.className="status no";
        showImage(nashvilleMatch?"nashville-coco":"general-no");
        details.innerHTML=`<div><b>${matchText}</b></div>`;
        setReferenceTime(dateText);
        renderStandings(event,standingsData);
        renderMarketValueInfo(event,marketData);
        renderFunFact(event);
      } else {
        status.textContent="Hoy juega";
        status.className="status yes";
        showImage(
          cruzAzulMatch ? "caz-hoy" :
          tolucaMatch   ? "toluca-hoy" :
                          "general-yes"
        );
        details.innerHTML=`
          <div><b>${matchText}</b></div>
          <div class="meta-line" style="margin-top:12px;">Partido programado para hoy</div>`;
        setReferenceTime(dateText);
        renderBroadcastInfo(event);
        renderStandings(event,standingsData);
        renderMarketValueInfo(event,marketData);
        renderFunFact(event);
      }

    } else {
      status.textContent=nashvilleMatch?"Todavía duele":"No juega hoy";
      status.className="status no";
      showImage(nashvilleMatch?"nashville-coco":"general-no");
      details.innerHTML=`
        <div><b>Último partido registrado</b></div>
        <div class="meta-line">${matchText}</div>`;
      setReferenceTime(dateText);
      renderStandings(event,standingsData);
      renderMarketValueInfo(event,marketData);
      renderFunFact(event);
    }

  } catch(err){
    status.textContent="Error al cargar";
    status.className="status no";
    showImage("general-no");
    details.innerHTML=`No fue posible cargar la información del partido.`;
    console.error(err);
  }
}

loadMatch();
</script>
