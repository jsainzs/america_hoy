.shell{

.title{

}
.visit-counter span{

}

.page-grid{
  display:grid;
  grid-template-columns:minmax(0,1fr) 260px;
  gap:24px;

}
.side-menu{
  position:sticky;
  top:20px;
}
.side-card{

}
.side-links{
  display:flex;
  flex-direction:column;
  gap:10px;
}
.side-link{
  display:block;
  text-decoration:none;
  font-weight:700;
  padding:12px 14px;
  border-radius:12px;
  transition:transform .12s ease, opacity .12s ease, background .12s ease;
}
.side-link:hover{
  transform:translateY(-1px);
  opacity:.95;
}
.side-link.primary{
  background:var(--accent);
  color:#0a1f44;
}
.side-link.secondary{
  background:rgba(255,255,255,.10);
  color:#fff;
  border:1px solid rgba(255,255,255,.12);
}

.main-stack{
  display:flex;
  flex-direction:column;
  gap:18px;
}
.layout{
  display:grid;
  grid-template-columns:minmax(280px,430px) 1fr;
  gap:34px;
  align-items:start;
}
.media-wrap{
  display:flex;
  justify-content:center;
  align-items:flex-start;
}
.hero-frame{
  width:100%;
  max-width:420px;
  min-height:320px;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:10px;
}
.hero{
  display:none;
  width:100%;
  max-width:400px;
  max-height:min(68vh,620px);
  object-fit:contain;
  border-radius:18px;
  box-shadow:var(--shadow);
  background:transparent;
}
.hero.visible{
  display:block;
}
.content{
  display:flex;
  flex-direction:column;
  justify-content:flex-start;
  min-height:100%;
  padding:8px 0;
}
.status{
  margin:0 0 16px;
  font-size:clamp(2rem,3vw,3rem);

.yes{color:var(--green);}
.no{color:var(--red);}
.details{

}
.details b{

}
.meta-line{

  border-radius:999px;
  background:rgba(0,0,0,.18);
  border:1px solid rgba(255,255,255,.12);
  font-size:.95rem;
  color:rgba(255,255,255,.95);
  backdrop-filter:blur(4px);

}
.reference-time{

}

.match-extra{

  color:#fff;
  font-size:.92rem;
}

#lastResultInfo{

}

.result-strip{

  border:1px solid rgba(250,204,21,.30);
  color:#fff;

}
.result-strip-title{

  text-transform:uppercase;

}
.result-strip-main{
  font-size:1.05rem;
  font-weight:800;

}
.result-strip-sub{

  color:rgba(255,255,255,.82);
}
.result-strip-link{
  display:inline-block;
  margin-top:10px;
  color:#fff;
  font-weight:700;
  text-decoration:underline;
  text-underline-offset:3px;
}

.broadcast-box{
  display:inline-flex;
  align-items:center;
  gap:8px;
  margin-top:14px;
  padding:9px 16px;
  border-radius:999px;
  background:rgba(250,204,21,.13);
  border:1px solid rgba(250,204,21,.28);
  font-size:.95rem;
  color:#fff;
  backdrop-filter:blur(4px);
  -webkit-backdrop-filter:blur(4px);
}
.broadcast-box .tv-icon{
  font-size:1.1rem;
  flex-shrink:0;
}
.broadcast-box .tv-label{
  color:rgba(255,255,255,.7);
  margin-right:4px;
}
.broadcast-box .tv-channels{
  font-weight:700;
  color:var(--accent);
}

.standings-box{

  border-radius:18px;
  background:rgba(0,0,0,.18);
  border:1px solid rgba(255,255,255,.12);
  backdrop-filter:blur(6px);
  -webkit-backdrop-filter:blur(6px);
  max-width:720px;
  box-shadow:0 10px 30px rgba(0,0,0,.18);
}
.standings-heading{
  font-size:1rem;
  font-weight:800;
  margin-bottom:14px;
  color:#fff;
  letter-spacing:.3px;
}
.standings-season{
  font-size:.82rem;
  font-weight:400;
  color:rgba(255,255,255,.55);
  margin-left:8px;
}
.standings-controls{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
  margin-bottom:10px;
}
.standings-window-label{
  font-size:.84rem;
  color:rgba(255,255,255,.7);
}
.standings-nav{
  display:flex;

.standings-nav button{

  width:36px;
  height:36px;
  border-radius:10px;
  background:rgba(255,255,255,.10);
  color:#fff;
  font-size:1rem;
  font-weight:800;
  cursor:pointer;
  border:1px solid rgba(255,255,255,.12);
  transition:transform .12s ease, background .12s ease, opacity .12s ease;
}
.standings-nav button:hover{
  transform:translateY(-1px);
  background:rgba(255,255,255,.16);
}
.standings-nav button:disabled{
  opacity:.45;
  cursor:not-allowed;
  transform:none;
}
.standings-table-wrap{
  overflow:hidden;
  border-radius:14px;
}
.standings-table{
  width:100%;
  border-collapse:collapse;
}
.standings-table th{
  font-size:.78rem;
  font-weight:700;
  color:rgba(255,255,255,.45);
  text-align:left;
  padding:0 6px 8px;
  letter-spacing:.5px;
  text-transform:uppercase;
}
.standings-table th.num{ text-align:center; }
.standings-table td{
  font-size:.95rem;
  color:rgba(255,255,255,.88);
  padding:7px 6px;
  border-top:1px solid rgba(255,255,255,.06);
}
.standings-table td.num{ text-align:center; }
.standings-table tr.highlight-america td{
  color:var(--accent);
  font-weight:700;
}
.standings-table tr.highlight-rival td{
  color:#93c5fd;
  font-weight:700;
}
.standings-meta{
  margin-top:12px;
  font-size:.82rem;
  color:rgba(255,255,255,.45);
}
.pos-badge{
  display:inline-block;
  width:24px;
  text-align:center;
}
.standings-legend{
  margin-top:10px;
  font-size:.82rem;
  color:rgba(255,255,255,.65);
  line-height:1.45;
}
.legend-america{ color:var(--accent); font-weight:700; }
.legend-rival{ color:#93c5fd; font-weight:700; }

.market-box,
.confidential-box{
  margin-top:18px;

  border-radius:18px;
  background:rgba(0,0,0,.18);
  border:1px solid rgba(255,255,255,.12);
  backdrop-filter:blur(6px);

}
.market-heading,
.confidential-title{
  font-size:1rem;
  font-weight:800;
  margin-bottom:12px;
  color:#fff;

}
.market-row{
  margin-bottom:16px;
}
.market-row:last-child{
  margin-bottom:0;
}
.market-label{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:12px;
  margin-bottom:8px;
  font-size:.98rem;
  color:rgba(255,255,255,.96);
}
.market-label strong{
  color:#fff;
}
.market-track{
  position:relative;
  height:16px;
  border-radius:999px;
  background:rgba(255,255,255,.08);
  border:1px solid rgba(255,255,255,.10);
  overflow:hidden;
}
.market-fill-america{
  height:100%;
  border-radius:999px;
  background:linear-gradient(90deg,rgba(250,204,21,.72),rgba(250,204,21,.96));
  box-shadow:0 0 14px rgba(250,204,21,.24);
}
.market-fill-rival{
  height:100%;
  border-radius:999px;

  box-shadow:0 0 12px rgba(255,255,255,.10);
}
.market-verdict{
  margin-top:14px;
  font-size:.98rem;
  line-height:1.5;
  color:rgba(255,255,255,.92);
}
.market-meta{
  margin-top:10px;
  font-size:.86rem;
  color:rgba(255,255,255,.74);
}
.confidential-text{
  font-size:1rem;
  line-height:1.55;
  color:rgba(255,255,255,.9);
}
.footer-copy{
  margin-top:30px;
  text-align:center;
}
.chanfle-img{
  display:block;
  margin:0 auto;
  max-width:220px;
  width:100%;
  height:auto;
}

@media (max-width:1080px){
  .page-grid{
    grid-template-columns:1fr;
  }
  .side-menu{
    position:static;
    order:-1;
  }
}
@media (max-width:860px){
  .shell{ padding:18px 16px 90px; }
  .layout{ grid-template-columns:1fr; gap:20px; }
  .content{ text-align:center; align-items:center; }
  .hero-frame{
    max-width:100%;
    min-height:unset;
    padding:0;
  }
  .hero{
    max-width:min(100%, 330px);
    max-height:50vh;
  }
  .market-label{ text-align:left; width:100%; }
  .market-box,
  .confidential-box,
  .standings-box{ width:100%; }
  .bg-tapestry::before,
  .bg-tapestry::after{ width:210%; left:-52%; }
  .standings-controls{
    flex-direction:column;
    align-items:stretch;
  }
  .result-strip{
    width:100%;
  }
  .match-extra{
    justify-content:center;
  }
}
@media (max-width:540px){
  .title{
    font-size:clamp(1.9rem,8vw,2.5rem);
  }
  .status{
    font-size:clamp(1.8rem,8vw,2.4rem);
  }
  .details{
    font-size:1rem;
  }
  .hero{
    max-width:min(100%, 290px);
    max-height:44vh;
  }
}
</style>
</head>

  "la galaxy":"la-galaxy","atlanta united":"atlanta-united",
  "seattle sounders":"seattle","seattle sounders fc":"seattle"
};

function normalizeTeamName(name){
  return (name || "")
    .normalize("NFD").replace(/[\u0300-\u036f]/g,"")
    .toLowerCase().replace(/\./g,"").replace(/\s+/g," ").trim();
}
function cleanTeamName(name){
  const n = normalizeTeamName(name);
  if(n === "cf america" || n === "club america" || n === "america") return "América";
  if(n === "guadalajara" || n === "club guadalajara") return "Chivas";
  if(n === "pumas unam") return "Pumas";
  return name || "";
}
function isVsCruzAzul(event){
  const h = normalizeTeamName(event?.strHomeTeam);
  const a = normalizeTeamName(event?.strAwayTeam);
  return h.includes("cruz azul") || a.includes("cruz azul");
}
function isVsToluca(event){
  const h = normalizeTeamName(event?.strHomeTeam);
  const a = normalizeTeamName(event?.strAwayTeam);
  return h.includes("toluca") || a.includes("toluca");
}
function isVsNashville(event){
  const h = normalizeTeamName(event?.strHomeTeam);
  const a = normalizeTeamName(event?.strAwayTeam);
  return h.includes("nashville") || a.includes("nashville");
}
function isAmericaName(name){
  const n = normalizeTeamName(name);
  return n === "america" || n === "cf america" || n === "club america" || n.includes("america");
}
function isAmericaHome(event){
  return isAmericaName(event?.strHomeTeam);
}
function getOpponentName(event){
  if(!event) return "";
  if(isAmericaName(event.strHomeTeam)) return event.strAwayTeam;
  if(isAmericaName(event.strAwayTeam)) return event.strHomeTeam;
  return event.strAwayTeam || "";
}
function getMarketTeamId(rawName){
  const n = normalizeTeamName(rawName);
  if(MARKET_VALUE_TEAM_ALIASES[n]) return MARKET_VALUE_TEAM_ALIASES[n];
  for(const key of Object.keys(MARKET_VALUE_TEAM_ALIASES)){
    if(n.includes(key) || key.includes(n)) return MARKET_VALUE_TEAM_ALIASES[key];
  }
  return null;
}
function isLigaMX(event){
  const league = (event?.strLeague || "").toLowerCase().trim();
  return LIGA_MX_KEYWORDS.some(l => league.includes(l));
}
function getMexicoDate(date){
  return new Intl.DateTimeFormat("en-CA",{
    timeZone: TZ, year:"numeric", month:"2-digit", day:"2-digit"
  }).format(date);
}
function formatMexicoDateTime(date){
  return new Intl.DateTimeFormat("es-MX",{
    timeZone: TZ,
    weekday:"long",
    day:"numeric",
    month:"long",
    hour:"2-digit",
    minute:"2-digit"
  }).format(date);
}
function parseDate(event){
  if(!event) return null;

  if(event.dateEventLocal && event.strTimeLocal){
    const localRaw = `${event.dateEventLocal}T${event.strTimeLocal}`;
    const localDate = new Date(localRaw);
    if(!isNaN(localDate)) return localDate;
  }

  let raw = event.strTimestamp || (event.dateEvent && event.strTime ? `${event.dateEvent}T${event.strTime}` : null) || event.dateEvent;
  if(!raw) return null;
  if(raw.length === 10) raw += "T12:00:00Z";
  else if(!raw.endsWith("Z")) raw += "Z";
  const d = new Date(raw);
  return isNaN(d) ? null : d;
}
function formatEurCompact(value){
  return new Intl.NumberFormat("es-MX",{
    style:"currency",
    currency:"EUR",
    notation:"compact",
    compactDisplay:"short",
    maximumFractionDigits:1
  }).format(value);
}
function setReferenceTime(dateText){
  document.getElementById("details").innerHTML +=
    `<div class="reference-time">Hora de referencia: ${dateText} (Ciudad de México)</div>`;
}
function getMatchLabel(event){
  return `${cleanTeamName(event.strHomeTeam)} vs ${cleanTeamName(event.strAwayTeam)}`;
}
function getResultLabel(event){
  const home = cleanTeamName(event.strHomeTeam);
  const away = cleanTeamName(event.strAwayTeam);
  const hs = event.intHomeScore ?? "-";
  const as = event.intAwayScore ?? "-";
  return `${home} ${hs} - ${as} ${away}`;
}
function getRoundLabel(event){
  if(!event?.intRound) return null;
  return `Jornada ${event.intRound}`;
}
function getVenueLabel(event){
  if(!event) return null;
  if(isAmericaHome(event)) return AMERICA_HOME_STADIUM;
  return event.strVenue || null;
}

let standingsSliderState = null;

async function loadStandings(){
  const res = await fetch(STANDINGS_URL);
  if(!res.ok) throw new Error("No se pudo cargar standings.json");
  return res.json();
}
function getInitialStandingsStart(americaIdx, rivalIdx, total, visibleCount){
  const minIdx = Math.min(americaIdx, rivalIdx);
  const maxIdx = Math.max(americaIdx, rivalIdx);
  let start = Math.max(0, Math.floor((minIdx + maxIdx) / 2) - Math.floor(visibleCount / 2));
  if(maxIdx >= start + visibleCount) start = maxIdx - visibleCount + 1;
  if(start + visibleCount > total) start = Math.max(0, total - visibleCount);
  return start;
}
function buildStandingsRows(table, start, visibleCount, americaIdx, rivalIdx){
  const slice = table.slice(start, start + visibleCount);
  return slice.map((t, localIdx) => {
    const absoluteIdx = start + localIdx;
    const isAmerica = absoluteIdx === americaIdx;
    const isRival = absoluteIdx === rivalIdx;
    const cls = isAmerica ? "highlight-america" : isRival ? "highlight-rival" : "";
    const label = isAmerica ? " 🦅" : isRival ? " ⚽" : "";
    return `
      <tr class="${cls}">
        <td class="num pos-badge">${t.position}</td>
        <td>${t.team}${label}</td>
        <td class="num">${t.points} pts</td>
      </tr>`;
  }).join("");
}
function refreshStandingsSlider(){
  if(!standingsSliderState) return;
  const { table, americaIdx, rivalIdx, visibleCount } = standingsSliderState;
  const total = table.length;
  const start = standingsSliderState.start;
  const end = Math.min(total, start + visibleCount);

  const tbody = document.getElementById("standingsSliderBody");
  const label = document.getElementById("standingsWindowLabel");
  const btnUp = document.getElementById("standingsPrevBtn");
  const btnDown = document.getElementById("standingsNextBtn");

  if(tbody) tbody.innerHTML = buildStandingsRows(table, start, visibleCount, americaIdx, rivalIdx);
  if(label) label.textContent = `Mostrando posiciones ${start + 1}–${end} de ${total}`;
  if(btnUp) btnUp.disabled = start <= 0;
  if(btnDown) btnDown.disabled = end >= total;
}
function moveStandings(delta){
  if(!standingsSliderState) return;
  const total = standingsSliderState.table.length;
  const maxStart = Math.max(0, total - standingsSliderState.visibleCount);
  standingsSliderState.start = Math.max(0, Math.min(maxStart, standingsSliderState.start + delta));
  refreshStandingsSlider();
}
function renderStandings(event, standingsData){
  const box = document.getElementById("standingsInfo");
  box.innerHTML = "";
  standingsSliderState = null;

  if(!event || !standingsData || !Array.isArray(standingsData.standings)) return;
  if(!isLigaMX(event)) return;

  const table = standingsData.standings;
  const rivalRaw = getOpponentName(event);
  const rivalId = getMarketTeamId(rivalRaw);

  const americaIdx = table.findIndex(t => t.team_id === "club-america");
  const rivalIdx = table.findIndex(t =>
    t.team_id === rivalId || normalizeTeamName(t.team) === normalizeTeamName(rivalRaw)
  );
  if(americaIdx === -1) return;

  const safeRivalIdx = rivalIdx === -1 ? americaIdx : rivalIdx;
  const visibleCount = Math.min(STANDINGS_VISIBLE_COUNT, table.length);
  const initialStart = getInitialStandingsStart(americaIdx, safeRivalIdx, table.length, visibleCount);

  standingsSliderState = {
    table,
    americaIdx,
    rivalIdx: safeRivalIdx,
    visibleCount,
    start: initialStart
  };

  box.innerHTML = `
    <div class="standings-box">
      <div class="standings-heading">
        Tabla de posiciones
        <span class="standings-season">${standingsData.season || ""}</span>
      </div>

      <div class="standings-controls">
        <div id="standingsWindowLabel" class="standings-window-label"></div>
        <div class="standings-nav">
          <button id="standingsPrevBtn" type="button" aria-label="Ver posiciones anteriores">↑</button>
          <button id="standingsNextBtn" type="button" aria-label="Ver posiciones siguientes">↓</button>
        </div>
      </div>

      <div class="standings-table-wrap">
        <table class="standings-table">
          <thead>
            <tr>
              <th class="num">#</th>
              <th>Equipo</th>
              <th class="num">Pts</th>
            </tr>
          </thead>
          <tbody id="standingsSliderBody"></tbody>
        </table>
      </div>

      <div class="standings-legend">
        <span class="legend-america">🦅 América</span> ·
        <span class="legend-rival">⚽ Rival</span>
      </div>

      <div class="standings-meta">Actualizado: ${standingsData.updated_at || "sin fecha"}</div>
    </div>`;

  document.getElementById("standingsPrevBtn").addEventListener("click", () => moveStandings(-1));
  document.getElementById("standingsNextBtn").addEventListener("click", () => moveStandings(1));
  refreshStandingsSlider();
}

async function loadMarketValues(){

}
function buildMarketVerdict(america, rival){
  if(!america || !rival) return "";
  const ratio = america.squad_value_eur / rival.squad_value_eur;
  const ratioText = ratio >= 1 ? `${ratio.toFixed(2)}x` : `${(1 / ratio).toFixed(2)}x`;
  if(america.squad_value_eur > rival.squad_value_eur) return `América vale <strong>${ratioText}</strong> lo que ${rival.team_name}.`;
  if(america.squad_value_eur < rival.squad_value_eur) return `${rival.team_name} vale <strong>${ratioText}</strong> lo que América.`;
  return `América y ${rival.team_name} llegan con el mismo valor de plantilla.`;
}
function renderMarketValueInfo(event, marketData){
  const box = document.getElementById("marketValueInfo");
  box.innerHTML = "";
  if(!event || !marketData || !Array.isArray(marketData.teams)) return;

  const rivalRaw = getOpponentName(event);
  const rivalId = getMarketTeamId(rivalRaw);
  const america = marketData.teams.find(t => t.team_id === "club-america");
  let rival = marketData.teams.find(t => t.team_id === rivalId);

  if(!rival){
    const nr = normalizeTeamName(rivalRaw);
    rival = marketData.teams.find(t => {
      const nt = normalizeTeamName(t.team_name);
      return nt === nr || nt.includes(nr) || nr.includes(nt);
    });
  }

  if(!america || !rival) return;

  const maxValue = Math.max(america.squad_value_eur, rival.squad_value_eur);
  const americaWidth = (america.squad_value_eur / maxValue) * 100;
  const rivalWidth = (rival.squad_value_eur / maxValue) * 100;
  const verdict = buildMarketVerdict(america, rival);

  box.innerHTML = `
    <div class="market-box">
      <div class="market-heading">Billetómetro (Transfermarkt)</div>
      <div class="market-row">
        <div class="market-label">
          <span>América</span><strong>${formatEurCompact(america.squad_value_eur)}</strong>
        </div>
        <div class="market-track">
          <div class="market-fill-america" style="width:${americaWidth}%"></div>
        </div>
      </div>
      <div class="market-row">
        <div class="market-label">
          <span>${rival.team_name}</span><strong>${formatEurCompact(rival.squad_value_eur)}</strong>
        </div>
        <div class="market-track">
          <div class="market-fill-rival" style="width:${rivalWidth}%"></div>
        </div>
      </div>
      <div class="market-verdict">${verdict}</div>
      <div class="market-meta">
        Ranking en su liga: América #${america.rank_in_league} · ${rival.team_name} #${rival.rank_in_league}<br>
        Corte de datos: ${marketData.updated_at || "sin fecha"} · Fuente: ${marketData.source || "Transfermarkt"}
      </div>
    </div>`;
}

  const res = await fetch(`${API_BASE}/lookupevent.php?id=${eventId}`);

function saveTrackedNextEvent(event){
  if(!event?.idEvent) return;
  localStorage.setItem("americaTrackedEventId", event.idEvent);
  localStorage.setItem("americaTrackedEventLabel", event.strEvent || "");
  localStorage.setItem("americaTrackedEventDate", event.dateEvent || "");
}
function getTrackedEventId(){
  return localStorage.getItem("americaTrackedEventId");
}
function getStoredLastFinishedEventId(){
  return localStorage.getItem("americaLastFinishedEventId");
}
function saveLastFinishedEventId(eventId){
  if(eventId) localStorage.setItem("americaLastFinishedEventId", eventId);
}
function shouldUseEventAsFinished(event){
  if(!event) return false;
  const status = (event.strStatus || "").toLowerCase();
  return status.includes("finished") && event.intHomeScore !== null && event.intAwayScore !== null;
}

async function resolveBestLastEvent(fallbackLastEvent){
  let best = fallbackLastEvent || null;

  const trackedEventId = getTrackedEventId();
  const storedFinishedEventId = getStoredLastFinishedEventId();

  const candidateIds = [];

  if (MANUAL_LAST_FINISHED_EVENT_ID) {
    candidateIds.push(MANUAL_LAST_FINISHED_EVENT_ID);
  }
  if (trackedEventId && !candidateIds.includes(trackedEventId)) {
    candidateIds.push(trackedEventId);
  }
  if (storedFinishedEventId && !candidateIds.includes(storedFinishedEventId)) {
    candidateIds.push(storedFinishedEventId);
  }

  for (const id of candidateIds) {
    const event = await fetchEventById(id).catch(() => null);
    if (shouldUseEventAsFinished(event)) {
      best = event;
      saveLastFinishedEventId(id);
      break;
    }
  }

  return best;
}

async function loadMatch(){
  const status = document.getElementById("status");
  const details = document.getElementById("details");
  const broadcastInfo = document.getElementById("broadcastInfo");
  const standingsInfo = document.getElementById("standingsInfo");
  const marketValueInfo = document.getElementById("marketValueInfo");
  const funFact = document.getElementById("funFact");
  const lastResultInfo = document.getElementById("lastResultInfo");
  const matchExtraInfo = document.getElementById("matchExtraInfo");

  status.textContent = "Consultando...";
  status.className = "status";
  details.innerHTML = "";
  broadcastInfo.innerHTML = "";
  standingsInfo.innerHTML = "";
  marketValueInfo.innerHTML = "";
  funFact.innerHTML = "";
  lastResultInfo.innerHTML = "";
  matchExtraInfo.innerHTML = "";
  hideAllImages();

  try{
    const [nextData, rawLastData, marketData, standingsData] = await Promise.all([
      loadNextMatch(),
      loadLastMatch().catch(() => null),
      loadMarketValues().catch(() => null),
      loadStandings().catch(() => null)
    ]);

    console.log("eventsnext:", nextData);
    console.log("eventslast:", rawLastData);

    const nextEvent = nextData?.events?.[0] || null;
    let lastEvent = rawLastData?.results?.[0] || null;

    lastEvent = await resolveBestLastEvent(lastEvent);

    if(lastEvent && shouldUseEventAsFinished(lastEvent)){
      renderLastResult(lastEvent);
    }

    if(nextEvent){
      saveTrackedNextEvent(nextEvent);
    }

    if(!nextEvent){
      status.textContent = "No juega hoy";
      status.className = "status no";
      showImage(lastEvent ? chooseImageModeForPast(lastEvent) : "general-no");

      if(lastEvent){
        details.innerHTML = `
          <div><b>No aparece aún el próximo partido</b></div>
          <div class="meta-line">Por ahora se muestra el último resultado confirmado</div>
        `;
        const lastDate = parseDate(lastEvent);
        if(lastDate) setReferenceTime(formatMexicoDateTime(lastDate));
        renderMatchExtraInfo(lastEvent, "past");
        renderStandings(lastEvent, standingsData);
        renderMarketValueInfo(lastEvent, marketData);
        renderFunFact(lastEvent);
      } else {
        details.innerHTML = `No fue posible encontrar información del próximo partido ni del último resultado.`;
      }
      return;
    }

    const date = parseDate(nextEvent);
    if(!date){
      status.textContent = "Error en fecha";
      status.className = "status no";
      showImage("general-no");
      details.innerHTML = `No fue posible interpretar la fecha del partido.`;
      return;
    }

    const today = getMexicoDate(new Date());
    const eventDate = getMexicoDate(date);
    const matchText = getMatchLabel(nextEvent);
    const dateText = formatMexicoDateTime(date);

    if(eventDate > today){
      status.textContent = "No juega hoy";
      status.className = "status no";
      showImage(chooseImageModeForUpcoming(nextEvent));
      details.innerHTML = `
        <div><b>Próximo partido</b></div>
        <div class="meta-line">${matchText}</div>
      `;
      setReferenceTime(dateText);
      renderMatchExtraInfo(nextEvent, "upcoming");
      renderBroadcastInfo(nextEvent);
      renderStandings(nextEvent, standingsData);
      renderMarketValueInfo(nextEvent, marketData);
      renderFunFact(nextEvent);
      return;
    }

    if(eventDate === today){
      const rawStatus = (nextEvent.strStatus || "").toLowerCase();
      const hasStartedOrFinished =
        rawStatus.includes("match finished") ||
        rawStatus.includes("finished") ||
        rawStatus.includes("ft") ||
        rawStatus.includes("live") ||
        rawStatus.includes("in progress") ||
        rawStatus.includes("halftime");

      if(hasStartedOrFinished){
        status.textContent = "Ya jugó hoy";
        status.className = "status no";
        showImage(chooseImageModeForPast(nextEvent));
        details.innerHTML = `
          <div><b>${matchText}</b></div>
          <div class="meta-line">El partido de hoy ya se disputó</div>
        `;
        setReferenceTime(dateText);
        renderMatchExtraInfo(nextEvent, "past");
        renderStandings(nextEvent, standingsData);
        renderMarketValueInfo(nextEvent, marketData);
        renderFunFact(nextEvent);
      } else {
        status.textContent = "Hoy juega";
        status.className = "status yes";
        showImage(chooseImageModeForToday(nextEvent));
        details.innerHTML = `
          <div><b>${matchText}</b></div>
          <div class="meta-line">Partido programado para hoy</div>
        `;
        setReferenceTime(dateText);
        renderMatchExtraInfo(nextEvent, "today");
        renderBroadcastInfo(nextEvent);
        renderStandings(nextEvent, standingsData);
        renderMarketValueInfo(nextEvent, marketData);
        renderFunFact(nextEvent);
      }
      return;
    }

    status.textContent = "No juega hoy";
    status.className = "status no";
    showImage(lastEvent ? chooseImageModeForPast(lastEvent) : "general-no");
    details.innerHTML = `
      <div><b>No hay partido del América hoy</b></div>
      <div class="meta-line">El siguiente partido registrado es ${matchText}</div>
    `;
    setReferenceTime(dateText);
    renderMatchExtraInfo(nextEvent, "upcoming");
    renderBroadcastInfo(nextEvent);
    renderStandings(nextEvent, standingsData);
    renderMarketValueInfo(nextEvent, marketData);
    renderFunFact(nextEvent);

  } catch(err){
    status.textContent = "Error al cargar";
    status.className = "status no";
    showImage("general-no");
    document.getElementById("details").innerHTML = `No fue posible cargar la información del partido.`;
    console.error(err);
  }
}

loadMatch();
</script>
</body>
</html>
